<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1e2c">
<title>ערבית מצילה חיים</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1A2B3C;direction:rtl;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
.W{max-width:480px;margin:0 auto;min-height:100vh;}
.topbar{background:#0f1e2c;padding:12px 16px 0;border-bottom:1px solid #1e3348;position:sticky;top:0;z-index:100;}
.tb-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;}
.tb-brand{color:#D2B48C;font-size:15px;font-weight:600;}
.tb-badges{display:flex;gap:5px;}
.bnew{background:#FF8C00;color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;display:none;}
.bstatus{background:#1D9E75;color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;}
.tb-tabs{display:flex;overflow-x:auto;scrollbar-width:none;}
.tb-tabs::-webkit-scrollbar{display:none;}
.tb-tab{white-space:nowrap;padding:8px 11px;color:rgba(210,180,140,0.5);font-size:12px;cursor:pointer;border-bottom:2px solid transparent;flex-shrink:0;transition:all 0.15s;}
.tb-tab.active{color:#D2B48C;border-bottom-color:#FF8C00;}
.scr{display:none;}.scr.on{display:block;}
.sbar{background:#FF8C00;padding:10px 12px;}
.si{background:#fff;border-radius:8px;display:flex;align-items:center;padding:0 12px;gap:8px;}
.si input{flex:1;border:none;outline:none;font-size:16px;padding:11px 0;direction:rtl;font-family:inherit;color:#222;background:transparent;}
.si input::placeholder{color:#aaa;}
.sx{background:none;border:none;color:#aaa;font-size:20px;cursor:pointer;}
.lrow{background:#e07800;padding:4px 12px;display:flex;gap:6px;}
.lb{flex:1;padding:5px;border-radius:6px;border:1px solid rgba(255,255,255,0.3);background:transparent;color:rgba(255,255,255,0.65);font-size:12px;cursor:pointer;font-family:inherit;text-align:center;}
.lb.active{background:rgba(255,255,255,0.2);color:#fff;border-color:rgba(255,255,255,0.8);}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#0f1e2c;}
.ct{background:#223344;padding:20px 12px 14px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;min-height:100px;justify-content:center;transition:background 0.12s;position:relative;}
.ct:active{background:#2a3f54;}
.ct.daily{background:#1a3025;}.ct.daily:active{background:#22402f;}
.ct.heart{background:#2a1828;}.ct.heart:active{background:#361e32;}
.ct.navy{background:#223344;}.ct.navy:active{background:#2a3f54;}
.ct.announce{background:#223344;}.ct.announce:active{background:#2a3f54;}
.ci{width:32px;height:32px;border-radius:50%;background:#1A2B3C;display:flex;align-items:center;justify-content:center;font-size:16px;}
.cn{color:#fff;font-size:12px;font-weight:500;text-align:center;line-height:1.3;}
.cc{color:#7a9ab5;font-size:11px;}
.lhdr{background:#0f1e2c;padding:11px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #1e3348;}
.bbtn{background:#1A2B3C;border:1px solid #2e4558;border-radius:8px;color:#D2B48C;font-size:13px;padding:5px 12px;cursor:pointer;font-family:inherit;}
.ltitle{color:#D2B48C;font-size:14px;font-weight:500;}
.litems{background:#1A2B3C;}
.li{padding:13px 16px;border-bottom:1px solid #1e3348;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.li:last-child{border-bottom:none;}
.li:active{background:#223344;}
.lt{color:#fff;font-size:15px;line-height:1.4;}
.la{color:#7a9ab5;font-size:14px;}
.smeta{padding:7px 16px;color:#7a9ab5;font-size:12px;background:#1A2B3C;}
.pbg{background:rgba(0,0,0,0.65);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:12px;padding-top:16px;}
.pop{background:#fff;border-radius:18px;width:100%;max-width:440px;padding:18px 16px 14px;}
.phe{color:#1A2B3C;font-size:18px;font-weight:600;text-align:center;margin-bottom:5px;line-height:1.4;}
.parsm{color:#D2B48C;font-size:17px;direction:rtl;font-family:Georgia,serif;text-align:center;margin-bottom:12px;font-weight:500;}
.pbox{background:#1A2B3C;border-radius:12px;padding:16px 14px;margin-bottom:12px;text-align:center;}
.ptrans{color:#fff;font-size:24px;font-weight:400;line-height:1.6;letter-spacing:0.03em;}
.ww{display:flex;align-items:center;gap:8px;margin-bottom:10px;background:#f5f5f5;border-radius:10px;padding:8px 12px;}
.wave{display:flex;align-items:center;gap:2px;flex:1;}
.wb{width:3px;border-radius:2px;background:#D2B48C;}
.wt{font-size:12px;color:#888;min-width:30px;}
.pbr{display:flex;gap:10px;margin-bottom:10px;}
.pbtn{flex:1;padding:13px 8px;border-radius:12px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;}
.pbtn.slow{background:#D2B48C;color:#412402;}
.pbtn.fast{background:#FF8C00;color:#fff;}
.pbtn:active{opacity:0.85;}
.ibox{border-radius:10px;padding:10px 14px;margin-bottom:8px;}
.ibox.b{background:#eef6ff;border:1px solid #c0d8f0;}
.ibox.o{background:#fff8ee;border:1px solid #ffe0a0;}
.ilbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;}
.ilbl.b{color:#1A2B3C;}.ilbl.o{color:#FF8C00;}
.itxt{font-size:13px;line-height:1.7;}
.itxt.b{color:#1a3a5c;}.itxt.o{color:#7a5000;}
.pclose{display:block;text-align:center;color:#aaa;font-size:14px;cursor:pointer;padding:4px 0 0;}
.sec{padding:14px;}
.stitle{color:#D2B48C;font-size:11px;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:12px;}
.card{background:#223344;border:1px solid #2e4558;border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;}
.card:active{background:#2a3f54;}
.ctags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px;align-items:center;}
.tag{font-size:9px;padding:2px 8px;border-radius:8px;font-weight:600;white-space:nowrap;}
.theart{background:#c0392b;color:#fff;}
.tprem{background:#D2B48C;color:#412402;}
.trh{background:#e74c3c;color:#fff;}.trm{background:#FF8C00;color:#fff;}.trl{background:#1D9E75;color:#fff;}
.che{color:#fff;font-size:15px;font-weight:500;margin-bottom:4px;}
.car{color:#D2B48C;font-size:19px;direction:rtl;font-family:Georgia,serif;margin-bottom:4px;}
.csub{color:#7a9ab5;font-size:12px;line-height:1.6;}
.cwarn{color:#ffb0b0;font-size:12px;padding:7px 10px;background:#2a1010;border:1px solid #5a2020;border-radius:7px;margin-top:7px;line-height:1.6;}
.nf{padding:14px 16px;}
.nfi{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid #1e3348;align-items:flex-start;}
.nfi:last-child{border-bottom:none;}
.nfd{width:8px;height:8px;border-radius:50%;background:#FF8C00;flex-shrink:0;margin-top:4px;}
.nfdate{font-size:11px;color:#7a9ab5;margin-bottom:2px;}
.nftxt{color:#fff;font-size:14px;line-height:1.5;}
.nfcat{font-size:11px;color:#FF8C00;margin-top:2px;}
.adm{padding:14px;}
.atrow{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;}
.atab{flex:1;min-width:55px;padding:7px 4px;border-radius:7px;border:1px solid #2e4558;background:#223344;color:#7a9ab5;font-size:11px;cursor:pointer;font-family:inherit;text-align:center;}
.atab.active{background:#FF8C00;color:#fff;border-color:#FF8C00;}
.acard{background:#223344;border:1px solid #2e4558;border-radius:12px;padding:14px;margin-bottom:10px;}
.afl{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.afl label{color:#D2B48C;font-size:11px;font-weight:500;}
.afl input,.afl select,.afl textarea{background:#1A2B3C;border:1px solid #2e4558;border-radius:8px;padding:9px 11px;color:#fff;font-size:14px;font-family:inherit;direction:rtl;outline:none;width:100%;}
.afl input:focus,.afl select:focus,.afl textarea:focus{border-color:#FF8C00;}
.afl textarea{min-height:58px;resize:vertical;}
.afl select option{background:#1A2B3C;}
.sbtn{width:100%;padding:12px;background:#FF8C00;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
.hlm{background:#FF8C00;color:#fff;border-radius:2px;padding:0 2px;}
.empty{text-align:center;padding:40px 20px;color:#7a9ab5;font-size:14px;}
.loading{text-align:center;padding:40px 20px;color:#D2B48C;font-size:14px;}
.rec-btn{padding:11px;border:none;border-radius:8px;color:#fff;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;}
.rec-btn.idle{background:#c0392b;}
.rec-btn.recording{background:#e74c3c;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.7;}}
/* Announce styles */
.announce-text{background:#0d1f3c;border-radius:12px;padding:16px;margin-bottom:12px;color:#fff;font-size:18px;line-height:2;text-align:right;direction:rtl;}
.announce-trans{background:#1A2B3C;border-radius:12px;padding:14px;margin-bottom:12px;color:#D2B48C;font-size:14px;line-height:1.8;display:none;}
/* Dictionary styles */
.dict-item{background:#223344;border:1px solid #2e4558;border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;}
.dict-he{color:#fff;font-size:15px;font-weight:500;}
.dict-trans{color:#FF8C00;font-size:14px;margin-top:3px;}
.dict-ar{color:#D2B48C;font-size:16px;font-family:Georgia,serif;margin-top:3px;}
</style>
</head>
<body>
<div class="W">
<div class="topbar">
  <div class="tb-top">
    <div class="tb-brand">ערבית מצילה חיים</div>
    <div class="tb-badges">
      <div class="bnew" id="new-badge">חדש</div>
      <div class="bstatus" id="status-badge">טוען...</div>
    </div>
  </div>
  <div class="tb-tabs">
    <div class="tb-tab active" onclick="ST('lib',this)">מבצעי</div>
    <div class="tb-tab" onclick="ST('day',this)">יומיומי</div>
    <div class="tb-tab" onclick="ST('hrt',this)">פותחים לב</div>
    <div class="tb-tab" onclick="ST('dict',this)">מילון</div>
    <div class="tb-tab" onclick="ST('sem',this)">סמנטי</div>
    <div class="tb-tab" onclick="ST('cus',this)">מנהגים</div>
    <div class="tb-tab" onclick="ST('art',this)">מאמרים</div>
    <div class="tb-tab" onclick="ST('nwf',this)">חדש ●</div>
    <div class="tb-tab" onclick="ST('adm',this)">ניהול</div>
  </div>
</div>

<!-- MILITARY TAB -->
<div class="scr on" id="tab-lib">
  <div class="sbar"><div class="si">
    <span style="color:#aaa;font-size:15px;">🔍</span>
    <input id="sinp" placeholder="חיפוש..." oninput="doS()"/>
    <button class="sx" onclick="clrS()">×</button>
  </div></div>
  <div class="lrow">
    <button class="lb active" id="lbhe" onclick="setL('he')">🔍 עברית</button>
    <button class="lb" id="lbar" onclick="setL('ar')">🔍 ערבית</button>
  </div>
  <div id="vcats" class="scr on">
    <div class="loading" id="cats-loading">טוען...</div>
    <div class="cgrid" id="cgrid" style="display:none;"></div>
  </div>
  <div id="vlist" class="scr">
    <div class="lhdr"><button class="bbtn" onclick="goB('lib')">→ חזור</button><div class="ltitle" id="ltitle"></div></div>
    <div class="litems" id="litems"></div>
  </div>
  <div id="vsrch" class="scr">
    <div class="smeta" id="smeta"></div>
    <div class="litems" id="sres"></div>
  </div>
  <div id="vpop" class="scr">
    <div class="pbg"><div class="pop">
      <div class="phe" id="phe"></div>
      <div class="parsm" id="parsm"></div>
      <div class="pbox"><div class="ptrans" id="ptrans"></div></div>
      <div class="ww"><div class="wave" id="wbars"></div><span class="wt" id="wtime">0:00</span></div>
      <div class="pbr">
        <button class="pbtn slow" onclick="play(this,'slow')">🐢 צב</button>
        <button class="pbtn fast" onclick="play(this,'fast')">🐇 ארנב</button>
      </div>
      <div class="ibox b" id="pwhyb"><div class="ilbl b">למה זה חשוב</div><div class="itxt b" id="pwhy"></div></div>
      <div class="ibox o" id="ptoneb"><div class="ilbl o">טיפ ללוחם</div><div class="itxt o" id="ptone"></div></div>
      <span class="pclose" onclick="clsP()">× סגור</span>
    </div></div>
  </div>
</div>

<!-- DAILY TAB -->
<div class="scr" id="tab-day">
  <div id="daily-grid-view">
    <div class="sec"><div class="stitle">ערבית יומיומית</div><div class="cgrid" id="dgrid"></div></div>
  </div>
  <div id="daily-list-view" style="display:none;">
    <div class="lhdr"><button class="bbtn" onclick="goB('day')">→ חזור</button><div class="ltitle" id="dltitle"></div></div>
    <div class="litems" id="dlitems"></div>
  </div>
</div>

<!-- HEART TAB -->
<div class="scr" id="tab-hrt">
  <div class="sec"><div class="stitle">דברים שפותחים לב</div><div id="hlist"><div class="empty">טוען...</div></div></div>
</div>

<!-- DICTIONARY TAB -->
<div class="scr" id="tab-dict">
  <div class="sbar"><div class="si">
    <span style="color:#aaa;font-size:15px;">🔍</span>
    <input id="dict-search" placeholder="חפש מילה בעברית..." oninput="searchDict()"/>
    <button class="sx" onclick="document.getElementById('dict-search').value='';searchDict()">×</button>
  </div></div>
  <div class="sec" style="padding-top:10px;">
    <div id="dict-results"></div>
  </div>
</div>

<!-- SEMANTIC TAB -->
<div class="scr" id="tab-sem">
  <div class="sec"><div class="stitle">מילון סמנטי — מילים עם משמעות כפולה</div><div id="semlist"></div></div>
</div>

<!-- CUSTOMS TAB -->
<div class="scr" id="tab-cus">
  <div class="sec"><div class="stitle">מנהגים ותרבות</div><div id="cuslist"></div></div>
</div>

<!-- ARTICLES TAB -->
<div class="scr" id="tab-art">
  <div id="artlv"><div class="sec"><div class="stitle">מאמרים מהשטח</div><div id="artlist"></div></div></div>
  <div id="artfv" style="display:none;">
    <div style="padding:16px;">
      <button class="bbtn" onclick="clsArt()" style="margin-bottom:14px;">→ חזור</button>
      <div style="color:#fff;font-size:16px;font-weight:600;margin-bottom:10px;line-height:1.4;" id="art-title"></div>
      <div style="color:#a0b8c8;font-size:14px;line-height:1.9;" id="art-body"></div>
    </div>
  </div>
</div>

<!-- NEW TAB -->
<div class="scr" id="tab-nwf"><div class="nf" id="nflist"></div></div>

<!-- ADMIN TAB -->
<div class="scr" id="tab-adm">
  <div class="adm">
    <div class="atrow">
      <button class="atab active" onclick="aT('ap',this)">+ מבצעי</button>
      <button class="atab" onclick="aT('ad',this)">+ יומיומי</button>
      <button class="atab" onclick="aT('ah',this)">+ פותח לב</button>
      <button class="atab" onclick="aT('ak',this)">+ כריזה</button>
      <button class="atab" onclick="aT('an',this)">+ ימי</button>
      <button class="atab" onclick="aT('adict',this)">+ מילון</button>
      <button class="atab" onclick="aT('al',this)">📋 רשימה</button>
      <button class="atab" onclick="aT('acat',this)">⚙️ קטגוריות</button>
    </div>

    <!-- Add Military -->
    <div id="at-ap"><div class="acard">
      <div class="afl"><label>קטגוריה</label><select id="apc">
        <option>עצירת תנועה</option><option>ניהול מרחב</option><option>בידוק וזיהוי</option>
        <option>שליטה בבית</option><option>הרגעה ושכנוע</option><option>מגע ראשוני</option>
        <option>עזרה ראשונה</option><option>לוח שנה ותרבות</option><option>מילון כללי</option>
      </select></div>
      <div class="afl"><label>עברית *</label><input id="aphe"/></div>
      <div class="afl"><label>תעתיק</label><input id="aptr"/></div>
      <div class="afl"><label>ערבית *</label><textarea id="apar" style="font-family:Georgia,serif;font-size:18px;"></textarea></div>
      <div class="afl"><label>תגיות</label><input id="aptg"/></div>
      <div class="afl"><label>למה זה חשוב</label><textarea id="apwy"></textarea></div>
      <div class="afl"><label>טיפ ללוחם</label><textarea id="aptn"></textarea></div>
      <div class="afl"><label>הקלטה</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="rec-btn idle" id="ap-rec" onclick="toggleRec('ap')">🎙 הקלט</button>
          <input type="file" id="ap-file" accept="audio/*" style="display:none;" onchange="onFile('ap')"/>
          <button type="button" onclick="document.getElementById('ap-file').click()" style="flex:1;padding:11px;background:#2e4558;border:none;border-radius:8px;color:#D2B48C;font-size:13px;cursor:pointer;font-family:inherit;">📁 קובץ</button>
        </div>
        <div id="ap-status" style="color:#1D9E75;font-size:12px;margin-top:5px;"></div>
      </div>
      <button class="sbtn" onclick="addP()">שמור</button>
    </div></div>

    <!-- Add Daily -->
    <div id="at-ad" style="display:none;"><div class="acard">
      <div class="afl"><label>קטגוריה</label><select id="adc">
        <option>שוק ומסחר</option><option>מסעדה ואוכל</option><option>שיחת היכרות</option>
        <option>עזרה וכיוונים</option><option>ילדים ובית ספר</option><option>שכנות וקהילה</option>
      </select></div>
      <div class="afl"><label>עברית *</label><input id="adhe"/></div>
      <div class="afl"><label>תעתיק</label><input id="adtr"/></div>
      <div class="afl"><label>ערבית *</label><textarea id="adar" style="font-family:Georgia,serif;font-size:18px;"></textarea></div>
      <div class="afl"><label>הקשר</label><textarea id="adtp"></textarea></div>
      <div class="afl"><label>הקלטה</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="rec-btn idle" id="ad-rec" onclick="toggleRec('ad')">🎙 הקלט</button>
          <input type="file" id="ad-file" accept="audio/*" style="display:none;" onchange="onFile('ad')"/>
          <button type="button" onclick="document.getElementById('ad-file').click()" style="flex:1;padding:11px;background:#2e4558;border:none;border-radius:8px;color:#D2B48C;font-size:13px;cursor:pointer;font-family:inherit;">📁 קובץ</button>
        </div>
        <div id="ad-status" style="color:#1D9E75;font-size:12px;margin-top:5px;"></div>
      </div>
      <button class="sbtn" onclick="addD()">שמור</button>
    </div></div>

    <!-- Add Heart -->
    <div id="at-ah" style="display:none;"><div class="acard">
      <div class="afl"><label>עברית *</label><input id="ahhe"/></div>
      <div class="afl"><label>תעתיק</label><input id="ahtr"/></div>
      <div class="afl"><label>ערבית *</label><textarea id="ahar" style="font-family:Georgia,serif;font-size:18px;"></textarea></div>
      <div class="afl"><label>מתי משתמשים</label><input id="ahwn"/></div>
      <div class="afl"><label>למה פותח לב</label><textarea id="ahwy"></textarea></div>
      <div class="afl"><label>הקלטה</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="rec-btn idle" id="ah-rec" onclick="toggleRec('ah')">🎙 הקלט</button>
          <input type="file" id="ah-file" accept="audio/*" style="display:none;" onchange="onFile('ah')"/>
          <button type="button" onclick="document.getElementById('ah-file').click()" style="flex:1;padding:11px;background:#2e4558;border:none;border-radius:8px;color:#D2B48C;font-size:13px;cursor:pointer;font-family:inherit;">📁 קובץ</button>
        </div>
        <div id="ah-status" style="color:#1D9E75;font-size:12px;margin-top:5px;"></div>
      </div>
      <button class="sbtn" onclick="addH()">שמור</button>
    </div></div>

    <!-- Add Announcement -->
    <div id="at-ak" style="display:none;"><div class="acard">
      <div class="afl"><label>קטגוריה כריזה</label><select id="akc">

async function sbFetch(path,method='GET',body=null){
  const opts={method,headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':''}};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(SUPA_URL+path,opts);
  if(!res.ok)throw new Error(await res.text());
  const t=await res.text();return t?JSON.parse(t):null;
}

async function cloudUp(file){
  const fd=new FormData();fd.append('file',file);fd.append('upload_preset',PRESET);fd.append('resource_type','video');
  const r=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/video/upload`,{method:'POST',body:fd});
  const d=await r.json();return d.secure_url||null;
}

let mrec=null,rchunks=[],rfiles={};
async function toggleRec(p){
  const btn=document.getElementById(p+'-rec');
  if(mrec&&mrec.state==='recording'){mrec.stop();btn.textContent='🎙 הקלט';btn.className='rec-btn idle';return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    rchunks=[];mrec=new MediaRecorder(stream);
    mrec.ondataavailable=e=>{if(e.data.size>0)rchunks.push(e.data);};
    mrec.onstop=()=>{
      const blob=new Blob(rchunks,{type:'audio/webm'});
      rfiles[p]=new File([blob],'rec.webm',{type:'audio/webm'});
      const st=document.getElementById(p+'-status');if(st)st.textContent='✓ הוקלט';
      stream.getTracks().forEach(t=>t.stop());
    };
    mrec.start();btn.textContent='⏹ עצור';btn.className='rec-btn recording';
    const st=document.getElementById(p+'-status');if(st)st.textContent='● מקליט...';
  }catch(e){alert('אנא אשרי גישה למיקרופון');}
}
function onFile(p){
  const f=document.getElementById(p+'-file').files[0];
  if(f){rfiles[p]=f;const st=document.getElementById(p+'-status');if(st)st.textContent='✓ '+f.name;}
}
async function getAudio(p,stEl){
  const f=rfiles[p];if(!f)return null;
  stEl.textContent='⏳ מעלה...';
  try{const u=await cloudUp(f);if(u){stEl.textContent='✓ הועלה';delete rfiles[p];return u;}}catch(e){stEl.textContent='✗ שגיאה';}
  return null;
}

function setL(l){sL=l;document.getElementById('lbhe').className='lb'+(l==='he'?' active':'');document.getElementById('lbar').className='lb'+(l==='ar'?' active':'');doS();}
function doS(){
  const q=document.getElementById('sinp').value.trim();
  if(!q){if(curC)shV('vlist');else shV('vcats');return;}
  const r=DB.filter(p=>sL==='he'?p.he.includes(q)||p.trans.includes(q)||(p.tags&&p.tags.includes(q)):p.ar.includes(q)||p.he.includes(q));
  document.getElementById('smeta').textContent=r.length+' תוצאות עבור "'+q+'"';
  rItems(r,document.getElementById('sres'),q);shV('vsrch');
}
function hl(t,q){if(!q)return t;return t.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span class="hlm">$1</span>');}
function rItems(items,el,q){
  if(!items.length){el.innerHTML='<div class="empty">לא נמצאו תוצאות</div>';return;}
  el.innerHTML=items.map(p=>{const i=DB.indexOf(p);return`<div class="li" onclick="opP(${i})"><div class="lt">${hl(p.he,q)}</div><div class="la">‹</div></div>`;}).join('');
}
function bldW(){const el=document.getElementById('wbars');el.innerHTML='';for(let i=0;i<32;i++){const b=document.createElement('div');b.className='wb';b.style.height=(4+Math.floor(Math.random()*14))+'px';el.appendChild(b);}}

let pt=null,curAudio=null;
function play(btn,speed){
  if(curAudio){curAudio.pause();curAudio=null;}if(pt)clearInterval(pt);
  const orig=btn.innerHTML,bars=document.querySelectorAll('.wb'),tEl=document.getElementById('wtime');
  const url=btn.getAttribute('data-audio')||'';
  if(url){
    const audio=new Audio(url);if(speed==='slow')audio.playbackRate=0.7;curAudio=audio;
    btn.innerHTML='⏸ מנגן...';bars.forEach((b,i)=>{b.style.background=i<2?'#FF8C00':'#D2B48C';});
    pt=setInterval(()=>{if(!audio.paused&&audio.duration){const pct=audio.currentTime/audio.duration;bars.forEach((b,i)=>{b.style.background=i<Math.floor(pct*bars.length)?'#FF8C00':'#D2B48C';});const s=Math.floor(audio.currentTime);tEl.textContent='0:'+(s<10?'0':'')+s;}},100);
    audio.onended=()=>{clearInterval(pt);btn.innerHTML=orig;bars.forEach(b=>{b.style.background='#D2B48C';});tEl.textContent='0:00';curAudio=null;};
    audio.onerror=()=>{clearInterval(pt);btn.innerHTML=orig;};
    audio.play().catch(()=>{btn.innerHTML=orig;});
  } else {
    const dur=speed==='slow'?8:4;let el=0;btn.innerHTML='⏸ מנגן...';
    bars.forEach((b,i)=>{b.style.background=i<2?'#FF8C00':'#D2B48C';});
    pt=setInterval(()=>{el+=0.1;const pct=Math.min(el/dur,1);bars.forEach((b,i)=>{b.style.background=i<Math.floor(pct*bars.length)?'#FF8C00':'#D2B48C';});const s=Math.floor(el);tEl.textContent='0:'+(s<10?'0':'')+s;if(el>=dur){clearInterval(pt);btn.innerHTML=orig;bars.forEach(b=>{b.style.background='#D2B48C';});tEl.textContent='0:00';}},100);
  }
}

// Admin list
async function renderAdminList(){
  const el=document.getElementById('admin-list');
  el.innerHTML='<div class="loading">טוען...</div>';
  try{
    const data=await sbFetch('/rest/v1/phrases?select=*&order=created_at.desc&limit=60');
    if(!data||!data.length){el.innerHTML='<div class="empty">אין משפטים עדיין</div>';return;}
    const sN={military:'מבצעי',daily:'יומיומי',heart:'פותחים לב',navy:'ימי',announce:'כריזה',dictionary:'מילון'};
    const sC={military:'#FF8C00',daily:'#1D9E75',heart:'#c0392b',navy:'#2980b9',announce:'#8e44ad',dictionary:'#27ae60'};
    el.innerHTML=data.map(p=>`
      <div style="background:#1A2B3C;border:1px solid #2e4558;border-radius:10px;padding:12px;margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
          <div style="flex:1;"><div style="color:#fff;font-size:14px;font-weight:500;">${p.he}</div>
          <div style="color:#7a9ab5;font-size:11px;">${p.trans||''}</div></div>
          <span style="font-size:10px;background:${sC[p.section]||'#FF8C00'};color:#fff;padding:2px 7px;border-radius:7px;white-space:nowrap;margin-right:6px;">${sN[p.section]||p.section}</span>
        </div>
        <div style="display:flex;gap:5px;align-items:center;margin-top:6px;">
          <span style="font-size:11px;color:${p.audio_url?'#1D9E75':'#7a9ab5'};">${p.audio_url?'🎵':'🔇'}</span>
          <div style="flex:1;"></div>
          <button onclick="openEdit('${p.id}','${(p.he||'').replace(/'/g,"\\'")}','${(p.trans||'').replace(/'/g,"\\'")}','${(p.ar||'').replace(/'/g,"\\'")}','${(p.why||'').replace(/'/g,"\\'")}','${(p.tone||'').replace(/'/g,"\\'")}','${p.audio_url||''}')" style="padding:5px 10px;background:#2e4558;border:none;border-radius:6px;color:#D2B48C;font-size:12px;cursor:pointer;font-family:inherit;">✏️</button>
          <button onclick="delP('${p.id}')" style="padding:5px 10px;background:#3a1a1a;border:1px solid #5a2020;border-radius:6px;color:#ff8080;font-size:12px;cursor:pointer;font-family:inherit;">🗑</button>
        </div>
      </div>`).join('');
  }catch(e){el.innerHTML='<div class="empty">שגיאה בטעינה</div>';}
}

function openEdit(id,he,trans,ar,why,tone,audioUrl){
  document.getElementById('edit-id').value=id;document.getElementById('edit-he').value=he;
  document.getElementById('edit-trans').value=trans;document.getElementById('edit-ar').value=ar;
  document.getElementById('edit-why').value=why;document.getElementById('edit-tone').value=tone;
  document.getElementById('edit-audio-cur').textContent=audioUrl?'✓ יש הקלטה':'אין הקלטה';
  document.getElementById('edit-status').textContent='';
  document.getElementById('edit-modal').style.display='flex';
}
async function saveEdit(){
  const id=document.getElementById('edit-id').value;
  const btn=document.getElementById('edit-save-btn');btn.textContent='שומר...';
  const updates={he:document.getElementById('edit-he').value.trim(),trans:document.getElementById('edit-trans').value.trim(),ar:document.getElementById('edit-ar').value.trim(),why:document.getElementById('edit-why').value.trim(),tone:document.getElementById('edit-tone').value.trim()};
  const au=await getAudio('edit',document.getElementById('edit-status'));if(au)updates.audio_url=au;
  try{await sbFetch('/rest/v1/phrases?id=eq.'+id,'PATCH',updates);closeEdit();await loadData();renderAdminList();btn.textContent='שמור';alert('✓ נשמר!');}catch(e){btn.textContent='שמור';alert('שגיאה: '+e.message);}
}
function closeEdit(){document.getElementById('edit-modal').style.display='none';delete rfiles['edit'];}
async function delP(id){
  if(!confirm('למחוק?'))return;
  try{await sbFetch('/rest/v1/phrases?id=eq.'+id,'DELETE');await loadData();renderAdminList();}catch(e){alert('שגיאה');}
}

function renderCatList(){
  const ALLCATS=[...CATS.map(c=>({...c,builtin:true,section:'military'})),...DCATS.map(c=>({...c,builtin:true,section:'daily'}))];
  document.getElementById('cat-list').innerHTML=ALLCATS.map(c=>`

    </div>`).join('');
}
async function addCat(){
  const name=document.getElementById('new-cat-name').value.trim();
  const icon=document.getElementById('new-cat-icon').value.trim()||'📌';
  const sec=document.getElementById('new-cat-sec').value;
  if(!name){alert('חובה: שם קטגוריה');return;}
  
  if(sec==='military'){
    CATS.push({id:name,icon});
    const opt=document.createElement('option');opt.value=name;opt.textContent=name;
    document.getElementById('apc').appendChild(opt);
    bldCats();
  } else if(sec==='daily'){
    DCATS.push({id:name,icon});
    const opt=document.createElement('option');opt.value=name;opt.textContent=name;
    document.getElementById('adc').appendChild(opt);
    rDG();
  }
  document.getElementById('new-cat-name').value='';
  document.getElementById('new-cat-icon').value='';
  renderCatList();
  alert('✓ קטגוריה נוספה!');
}
