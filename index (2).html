<script>

const SUPA_URL = 'https://ukynfcwxsrzpuqecfjuz.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVreW5mY3d4c3J6cHVxZWNmanV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NTc2ODgsImV4cCI6MjA5MzUzMzY4OH0.lobr6E2Sfo5LMzhK2XklRJsY8FbVxl_v2Ar3XTGW4ew';

async function supaFetch(path, method='GET', body=null) {
  const opts = {
    method,
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': method==='POST' ? 'return=representation' : ''
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SUPA_URL + path, opts);
  return res.json();
}

async function loadFromSupabase() {
  try {
    const data = await supaFetch('/rest/v1/phrases?select=*&order=created_at.asc');
    if (Array.isArray(data) && data.length > 0) {
      // Map Supabase data to app format
      const military = data.filter(p => p.section === 'military' || !p.section);
      const daily = data.filter(p => p.section === 'daily');
      const heart = data.filter(p => p.section === 'heart');
      
      if (military.length > 0) {
        DB = military.map(p => ({
          cat: p.cat, he: p.he, trans: p.trans||'', ar: p.ar,
          tags: p.tags||'', why: p.why||'', tone: p.tone||'',
          audio: p.audio_url||'', isNew: p.is_new||false, id: p.id
        }));
      }
      if (daily.length > 0) {
        DAILY = daily.map(p => ({
          cat: p.cat, he: p.he, trans: p.trans||'', ar: p.ar,
          tip: p.why||'', audio: p.audio_url||'', isNew: p.is_new||false, id: p.id
        }));
      }
      if (heart.length > 0) {
        HEART = heart.map(p => ({
          he: p.he, trans: p.trans||'', ar: p.ar,
          when: p.tags||'', why: p.why||'', audio: p.audio_url||'', isNew: p.is_new||false, id: p.id
        }));
      }
      bldCats();
      console.log('Loaded from Supabase:', data.length, 'phrases');
    }
  } catch(e) {
    console.log('Offline mode - using local data');
  }
}

async function saveToSupabase(phrase, section) {
  const row = {
    cat: phrase.cat || '',

// Upload audio to Supabase Storage
async function uploadAudio(file, filename) {
  const res = await fetch(SUPA_URL + '/storage/v1/object/audio/' + filename, {
    method: 'POST',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': file.type
    },
    body: file
  });
  const data = await res.json();
  if (data.Key) {
    return SUPA_URL + '/storage/v1/object/public/audio/' + filename;
  }
  return null;
}

let pt=null;
let currentAudio=null;
function play(btn,speed){
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  if(pt)clearInterval(pt);
  const orig=btn.innerHTML;
  const bars=document.querySelectorAll('.wb');
  const tEl=document.getElementById('wtime');
  // Get audio URL from current popup item
  const audioUrl=btn.getAttribute('data-audio')||'';
  if(audioUrl){
    const audio=new Audio(audioUrl);
    if(speed==='slow'){audio.playbackRate=0.7;}
    currentAudio=audio;
    btn.innerHTML='⏸ מנגן...';
    bars.forEach((b,i)=>{b.style.background=i<2?'#FF8C00':'#D2B48C';});
    let el=0;
    pt=setInterval(()=>{
      el+=0.1;
      if(!audio.paused&&audio.duration){
        const pct=audio.currentTime/audio.duration;
        bars.forEach((b,i)=>{b.style.background=i<Math.floor(pct*bars.length)?'#FF8C00':'#D2B48C';});
        const s=Math.floor(audio.currentTime);
        tEl.textContent='0:'+(s<10?'0':'')+s;
      }
    },100);
    audio.onended=()=>{clearInterval(pt);btn.innerHTML=orig;bars.forEach(b=>{b.style.background='#D2B48C';});tEl.textContent='0:00';currentAudio=null;};
    audio.onerror=()=>{clearInterval(pt);btn.innerHTML=orig;};
    audio.play().catch(()=>{btn.innerHTML=orig;});
  } else {
    // Simulation fallback
    const dur=speed==='slow'?8:4;
    let el=0;btn.innerHTML='⏸ מנגן...';
    bars.forEach((b,i)=>{b.style.background=i<2?'#FF8C00':'#D2B48C';});
    pt=setInterval(()=>{el+=0.1;const pct=Math.min(el/dur,1);bars.forEach((b,i)=>{b.style.background=i<Math.floor(pct*bars.length)?'#FF8C00':'#D2B48C';});const s=Math.floor(el);tEl.textContent='0:'+(s<10?'0':'')+s;if(el>=dur){clearInterval(pt);btn.innerHTML=orig;bars.forEach(b=>{b.style.background='#D2B48C';});tEl.textContent='0:00';}},100);
  }
}

  document.getElementById('ehe').value = p.he;
  document.getElementById('etr').value = p.trans || '';
  document.getElementById('ear').value = p.ar;
  document.getElementById('etg').value = p.tags || '';
  document.getElementById('ewy').value = p.why || '';
  document.getElementById('etn').value = p.tone || '';
  const m = document.getElementById('edit-modal');
  m.style.display = 'flex';
}
function clsEdit() {
  document.getElementById('edit-modal').style.display = 'none';
  editIdx = -1;
}
function saveEdit() {
  if (editIdx < 0) return;
  const he = document.getElementById('ehe').value.trim();
  const ar = document.getElementById('ear').value.trim();
  if (!he || !ar) { alert('חובה: עברית וערבית'); return; }
  DB[editIdx] = {
    cat: document.getElementById('ecat').value,
    he, trans: document.getElementById('etr').value.trim(),
    ar, tags: document.getElementById('etg').value.trim(),
    why: document.getElementById('ewy').value.trim(),
    tone: document.getElementById('etn').value.trim(),
    isNew: DB[editIdx].isNew
  };
  clsEdit();
  bldCats();
  rAdm();
  alert('נשמר בהצלחה!');
}
function delP(i) {
  if (!confirm('למחוק את המשפט?')) return;
  DB.splice(i, 1);
  bldCats();
  rAdm();
}
function rAdm() {
  const el = document.getElementById('adm-list');
  if (!el) return;
  el.innerHTML = DB.map((p, i) => `
    <div style="background:#1A2B3C;border:1px solid #2e4558;border-radius:8px;padding:10px 12px;margin-bottom:7px;">
      <div style="color:#fff;font-size:13px;font-weight:500;">${p.he}</div>
      <div style="color:#7a9ab5;font-size:12px;margin-top:2px;">${p.ar}</div>
      <div style="color:#FF8C00;font-size:11px;margin-top:2px;">${p.cat}</div>
      <div style="display:flex;gap:7px;margin-top:8px;">
        <button onclick="opEdit(${i})" style="flex:1;padding:6px;background:#2e4558;border:none;border-radius:6px;color:#D2B48C;font-size:12px;cursor:pointer;font-family:inherit;">✏️ ערוך</button>
        <button onclick="delP(${i})" style="flex:1;padding:6px;background:#3a1a1a;border:1px solid #5a2020;border-radius:6px;color:#ff8080;font-size:12px;cursor:pointer;font-family:inherit;">🗑 מחק</button>
      </div>
    </div>`).join('');
}

bldCats();alert('נוסף!');
}
async function addD(){
  const he=document.getElementById('adhe').value.trim(),ar=document.getElementById('adar').value.trim();
  if(!he||!ar){alert('חובה');return;}
  const phrase={cat:document.getElementById('adc').value,he,trans:document.getElementById('adtr').value.trim(),ar,tip:document.getElementById('adtp').value.trim(),audio:'',isNew:true};
  DAILY.push(phrase);
  ['adhe','adar','adtr','adtp'].forEach(id=>document.getElementById(id).value='');
  try { await saveToSupabase(phrase,'daily'); } catch(e) {}
  alert('נוסף!');
}
function addH(){
  const he=document.getElementById('ahhe').value.trim(),ar=document.getElementById('ahar').value.trim();
  if(!he||!ar){alert('חובה');return;}
  HEART.push({he,trans:document.getElementById('ahtr').value.trim(),ar,when:document.getElementById('ahwn').value.trim(),why:document.getElementById('ahwy').value.trim(),isNew:true});
  ['ahhe','ahar','ahtr','ahwn','ahwy'].forEach(id=>document.getElementById(id).value='');
  alert('נוסף!');
}
function addS(){
  const ar=document.getElementById('asar').value.trim(),field=document.getElementById('asfd').value.trim();
  if(!ar||!field){alert('חובה');return;}
  SEM.push({ar,trans:document.getElementById('astr').value.trim(),dict:document.getElementById('asdc').value.trim(),field,risk:document.getElementById('asrk').value,isNew:true});
  ['asar','astr','asdc','asfd'].forEach(id=>document.getElementById(id).value='');
  rSem();alert('נוסף!');
}
function addC(){
  const t=document.getElementById('actit').value.trim(),b=document.getElementById('acbdy').value.trim();
  if(!t||!b){alert('חובה');return;}
  CUS.push({title:t,body:b,cat:document.getElementById('accat').value,isNew:true});
  ['actit','acbdy'].forEach(id=>document.getElementById(id).value='');
  alert('נוסף!');
}
function addA(){
  const t=document.getElementById('aat').value.trim(),b=document.getElementById('aab').value.trim();
  if(!t||!b){alert('חובה');return;}
  ARTS.push({title:t,body:b,isNew:true});
  ['aat','aab'].forEach(id=>document.getElementById(id).value='');
  alert('פורסם!');
}
bldCats();
loadFromSupabase();
</script>
