<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🚨 הסרה מיידית של תוכן תרבותי</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f1e2c;color:#fff;font-family:-apple-system,sans-serif;padding:20px;min-height:100vh;direction:rtl;line-height:1.5;}
.box{max-width:560px;margin:20px auto;background:#1A2B3C;border:2px solid #c0392b;border-radius:14px;padding:24px;}
h1{color:#FF8C00;font-size:22px;margin-bottom:10px;}
.danger{background:rgba(192,57,43,0.2);border:1px solid #c0392b;color:#ff8a7a;padding:14px;border-radius:8px;font-size:13px;line-height:1.6;margin-bottom:18px;}
.btn{background:#c0392b;color:#fff;border:none;border-radius:10px;padding:18px 24px;font-size:16px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;}
.btn:hover,.btn:active{background:#a82318;}
.btn:disabled{background:#666;cursor:wait;}
.btn.green{background:#1D9E75;}
#log{margin-top:18px;font-size:12px;line-height:1.6;max-height:380px;overflow-y:auto;background:#0f1e2c;border:1px solid #2e4558;border-radius:8px;padding:12px;font-family:monospace;direction:rtl;}
.ok{color:#1D9E75;}
.warn-line{color:#FFD700;}
.err{color:#e74c3c;}
.info{color:#7a9ab5;}
.summary{background:rgba(29,158,117,0.15);border:1px solid #1D9E75;border-radius:10px;padding:16px;margin-top:14px;color:#7eecc1;text-align:center;display:none;line-height:1.7;}
.summary.show{display:block;}
.summary strong{color:#fff;font-size:18px;display:block;margin-bottom:8px;}
</style>
</head>
<body>
<div class="box">
  <h1>🚨 הסרה מיידית - תוכן תרבותי</h1>
  <div class="danger">
    <strong>פעולה זו תסיר:</strong><br>
    • 2 הכניסות במנהגים (לחיצת ידיים + סוליית הנעל)<br>
    • 10 פאקטים תרבותיים שנוספו למשפטים קיימים<br>
    <br>
    המשפטים עצמם יישארו - רק הפאקט התרבותי יוסר.
  </div>
  
  <button class="btn" id="goBtn" onclick="runIt()">🗑️ הסר הכל עכשיו</button>
  <div class="summary" id="summary"></div>
  <div id="log"></div>
</div>

<script>
const SUPA_URL = 'https://ukynfcwxsrzpuqecfjuz.supabase.co';
const SUPA_KEY = 'sb_publishable_ugMP9beQh9-TJVGL3uzIAA_xhAgWJQP';
const CUSTOMS = ["🤝 לחיצת ידיים", "👟 סוליית הנעל"];
const FACTS_BY_PHRASE = {"שלום עליכם": "🤝 לחיצת יד ימין בלבד עם גברים. בדיוק מסיבה זו - לא להושיט יד לאישה - הנח יד ימין על החזה כברכה.", "שלום, מה שלומך?": "🤝 לחיצת יד ימין בלבד עם גברים. בדיוק מסיבה זו - לא להושיט יד לאישה - הנח יד ימין על החזה כברכה.", "בוקר טוב": "🤝 לחיצת יד ימין בלבד עם גברים. בדיוק מסיבה זו - לא להושיט יד לאישה - הנח יד ימין על החזה כברכה.", "אנחנו מכוחות הביטחון": "🤝 לחיצת יד ימין בלבד עם גברים. בדיוק מסיבה זו - לא להושיט יד לאישה - הנח יד ימין על החזה כברכה.", "איך קוראים לך?": "🤝 לחיצת יד ימין בלבד עם גברים. בדיוק מסיבה זו - לא להושיט יד לאישה - הנח יד ימין על החזה כברכה.", "סלחי לי, גברתי": "🤝 בלי מגע יד עם נשים. הנח יד ימין על החזה כברכה במקום.", "יש כאן חיילת?": "🤝 בלי מגע יד עם נשים. הנח יד ימין על החזה כברכה במקום.", "אני קוראת לחיילת": "🤝 בלי מגע יד עם נשים. הנח יד ימין על החזה כברכה במקום.", "יש לך משהו בתיק?": "👟 שים לב לסוליית הנעל - לא להפנות אותה כלפי המבוקש. ייתפס כזלזול חמור.", "יש לך תעודה?": "👟 שים לב לסוליית הנעל - לא להפנות אותה כלפי המבוקש. ייתפס כזלזול חמור."};

function log(msg, cls) {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  if(cls)d.className=cls;
  d.textContent = msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

async function sbFetch(path, method, body) {
  const headers = {
    apikey: SUPA_KEY,
    Authorization: 'Bearer ' + SUPA_KEY,
    Accept: 'application/json',
    'Content-Type': 'application/json'
  };
  if (method !== 'DELETE') headers.Prefer = 'return=representation';
  const opts = {method:method||'GET', headers};
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(SUPA_URL + path, opts);
  if (!r.ok) { const t = await r.text(); throw new Error('HTTP ' + r.status + ': ' + t); }
  if (method === 'DELETE') return null;
  return r.json();
}

async function runIt() {
  const btn = document.getElementById('goBtn');
  btn.disabled = true;
  btn.textContent = '⏳ מסיר...';
  document.getElementById('log').innerHTML = '';
  document.getElementById('summary').classList.remove('show');
  
  let customsDeleted = 0, factsRemoved = 0, errors = 0;
  
  try {
    // PART A: Delete the 2 customs entries
    log('═══ חלק א\': מסיר 2 כניסות במנהגים ═══', 'info');
    for (const he of CUSTOMS) {
      try {
        const found = await sbFetch('/rest/v1/phrases?he=eq.' + encodeURIComponent(he) + '&section=eq.customs&select=id');
        if (!found || found.length === 0) {
          log('? לא נמצא: "' + he + '"', 'warn-line');
          continue;
        }
        for (const item of found) {
          await sbFetch('/rest/v1/phrases?id=eq.' + encodeURIComponent(item.id), 'DELETE');
          log('🗑️ נמחק: "' + he + '"', 'ok');
          customsDeleted++;
        }
      } catch(e) {
        log('✗ שגיאה: ' + he + ' - ' + e.message.substring(0,60), 'err');
        errors++;
      }
    }
    
    log('', '');
    log('═══ חלק ב\': מסיר פאקטים ממשפטים ═══', 'info');
    
    // PART B: Remove the cultural facts from phrases
    for (const [phraseHe, fact] of Object.entries(FACTS_BY_PHRASE)) {
      try {
        const found = await sbFetch('/rest/v1/phrases?he=eq.' + encodeURIComponent(phraseHe) + '&select=id,why');
        if (!found || found.length === 0) {
          log('? לא נמצא: "' + phraseHe + '"', 'warn-line');
          continue;
        }
        
        const p = found[0];
        let currentWhy = (p.why || '');
        
        if (currentWhy.indexOf(fact) === -1) {
          log('⊘ אין פאקט: "' + phraseHe + '"', 'warn-line');
          continue;
        }
        
        // Remove fact + any preceding separator
        let newWhy = currentWhy.replace('\n---\n' + fact, '');
        newWhy = newWhy.replace(fact + '\n---\n', '');
        newWhy = newWhy.replace(fact, '');
        newWhy = newWhy.trim();
        
        await sbFetch('/rest/v1/phrases?id=eq.' + encodeURIComponent(p.id), 'PATCH', {why: newWhy});
        log('✓ הוסר מ-"' + phraseHe + '"', 'ok');
        factsRemoved++;
      } catch(e) {
        log('✗ שגיאה: "' + phraseHe + '" - ' + e.message.substring(0,60), 'err');
        errors++;
      }
    }
    
    log('', '');
    log('═══════════ סיכום ═══════════', 'info');
    log('🗑️ כניסות במנהגים נמחקו: ' + customsDeleted, 'ok');
    log('🗑️ פאקטים הוסרו ממשפטים: ' + factsRemoved, 'ok');
    if (errors > 0) log('⚠️ שגיאות: ' + errors, 'warn-line');
    
    const sum = document.getElementById('summary');
    sum.innerHTML = '<strong>🎉 הסרה הושלמה</strong>' +
      'נמחקו ' + (customsDeleted + factsRemoved) + ' פריטים.<br>' +
      'רענני את האפליקציה (Ctrl+Shift+R) כדי לראות.';
    sum.classList.add('show');
    
    btn.textContent = '✓ סיים';
    btn.className = 'btn green';
  } catch(e) {
    log('שגיאה כללית: ' + e.message, 'err');
    btn.disabled = false;
    btn.textContent = '🗑️ נסה שוב';
  }
}
</script>
</body>
</html>
