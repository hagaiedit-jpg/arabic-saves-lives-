<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>תיקון תרחיש: מבוקש מתכחש</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0E1B2E;color:#fff;font-family:-apple-system,sans-serif;padding:20px;direction:rtl;}
.box{max-width:800px;margin:20px auto;background:#1A2B3C;border:1px solid #2e4558;border-radius:14px;padding:24px;}
h1{color:#D4A24E;font-size:22px;margin-bottom:14px;}
.intro{background:rgba(212,162,78,0.15);border:1px solid #D4A24E;border-radius:10px;padding:14px;margin-bottom:18px;font-size:13px;line-height:1.7;}
.step{background:#0E1B2E;border:1px solid #2e4558;border-radius:10px;padding:12px;margin-bottom:8px;}
.step-he{color:#D4A24E;font-weight:700;font-size:13px;}
.step-cat{color:#a0b8c8;font-size:11px;margin-top:3px;}
.step-section{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;}
.section-military{background:rgba(212,134,46,0.3);color:#D4862E;}
.section-scenario{background:rgba(29,158,117,0.3);color:#1D9E75;}
.btn{background:#1D9E75;color:#fff;border:none;border-radius:10px;padding:14px 22px;font-size:15px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;margin-top:18px;}
.btn:disabled{background:#666;cursor:not-allowed;}
#out{margin-top:18px;font-size:14px;line-height:1.7;background:#0E1B2E;border:1px solid #2e4558;border-radius:8px;padding:14px;max-height:400px;overflow-y:auto;}
.success{background:rgba(29,158,117,0.15);border:1px solid #1D9E75;color:#7eecc1;padding:6px 10px;border-radius:6px;margin-bottom:4px;font-size:12px;}
.error{background:rgba(231,76,60,0.15);border:1px solid #e74c3c;color:#ff9080;padding:6px 10px;border-radius:6px;margin-bottom:4px;font-size:12px;}
</style>
</head>
<body>
<div class="box">
  <h1>🔧 תיקון תרחיש "מבוקש מתכחש"</h1>
  
  <div class="intro">
    <strong>הבעיה:</strong> 15 שלבי התרחיש נשמרו ב-section "<strong>מבצעי</strong>" במקום "<strong>תרחיש</strong>".<br>
    <strong>הפתרון:</strong> הכלי מעדכן את ה-section ל-"scenario" - <strong>בלי למחוק את ההקלטות!</strong>
  </div>
  
  <div id="found">טוען...</div>
  
  <button class="btn" id="fixBtn" onclick="fix()" style="display:none;">🔧 תקן את ה-section ל-"scenario"</button>
  <div id="out"></div>
</div>

<script>
const SUPA_URL = 'https://ukynfcwxsrzpuqecfjuz.supabase.co';
const SUPA_KEY = 'sb_publishable_ugMP9beQh9-TJVGL3uzIAA_xhAgWJQP';

let TO_FIX = [];

async function loadPhrases() {
  // Find ALL phrases with cat="מבוקש מתכחש" in ANY section
  const resp = await fetch(SUPA_URL + "/rest/v1/phrases?cat=eq.מבוקש%20מתכחש&select=*", {
    headers: {apikey: SUPA_KEY, Authorization: "Bearer " + SUPA_KEY}
  });
  const data = await resp.json();
  
  const inMilitary = data.filter(p => p.section === "military");
  const inScenario = data.filter(p => p.section === "scenario");
  
  let html = "<div style='background:rgba(29,158,117,0.1);border:1px solid #1D9E75;padding:14px;border-radius:10px;margin-bottom:14px;'>";
  html += "<strong>📊 מה נמצא במאגר:</strong><br>";
  html += "📁 ב-section 'מבצעי' (military): <strong style='color:#D4862E;'>" + inMilitary.length + "</strong><br>";
  html += "💬 ב-section 'תרחיש' (scenario): <strong style='color:#1D9E75;'>" + inScenario.length + "</strong>";
  html += "</div>";
  
  if (inMilitary.length === 0) {
    html += "<div style='padding:14px;background:rgba(192,57,43,0.1);border:1px solid #c0392b;border-radius:8px;'>";
    html += "✅ אין מה לתקן - אין משפטים ב-military עם cat='מבוקש מתכחש'";
    html += "</div>";
  } else {
    TO_FIX = inMilitary;
    
    html += "<div style='font-size:13px;color:#E8D9B8;margin-bottom:10px;'>🔍 משפטים שיתוקנו:</div>";
    inMilitary.forEach((p, i) => {
      const stepMatch = (p.tags || "").match(/step(\d+)/);
      const stepNum = stepMatch ? stepMatch[1] : (i + 1);
      const hasAudio = !!p.audio_url;
      html += "<div class='step'>";
      html += "<div style='display:flex;justify-content:space-between;align-items:center;'>";
      html += "<div style='flex:1;'>";
      html += "<div class='step-he'>" + stepNum + ". " + (p.he || "") + "</div>";
      html += "<div class='step-cat'>id: " + p.id + " | קטגוריה: " + p.cat + " " + (hasAudio ? "| ✅ הקלטה" : "| ❌ אין הקלטה") + "</div>";
      html += "</div>";
      html += "<span class='step-section section-military'>military</span>";
      html += "</div></div>";
    });
    
    document.getElementById("fixBtn").style.display = "block";
    document.getElementById("fixBtn").textContent = "🔧 תקן את " + inMilitary.length + " המשפטים ל-section 'scenario'";
  }
  
  document.getElementById("found").innerHTML = html;
}

async function fix() {
  const btn = document.getElementById("fixBtn");
  const out = document.getElementById("out");
  btn.disabled = true;
  
  let html = "";
  let success = 0, failed = 0;
  
  for (const phrase of TO_FIX) {
    try {
      // Update ONLY the section field - keep audio_url, responses, everything!
      const resp = await fetch(SUPA_URL + "/rest/v1/phrases?id=eq." + phrase.id, {
        method: "PATCH",
        headers: {
          apikey: SUPA_KEY,
          Authorization: "Bearer " + SUPA_KEY,
          "Content-Type": "application/json",
          Prefer: "return=minimal"
        },
        body: JSON.stringify({section: "scenario"})
      });
      
      if (resp.ok) {
        html += "<div class='success'>✓ " + phrase.he + " (id: " + phrase.id + ")</div>";
        success++;
      } else {
        const errText = await resp.text();
        html += "<div class='error'>✗ " + phrase.he + " - " + errText + "</div>";
        failed++;
      }
    } catch(e) {
      html += "<div class='error'>✗ " + phrase.he + " - " + e.message + "</div>";
      failed++;
    }
    out.innerHTML = html;
    await new Promise(r => setTimeout(r, 150));
  }
  
  html += "<div style='margin-top:14px;padding:14px;background:rgba(29,158,117,0.15);border:1px solid #1D9E75;border-radius:8px;'>";
  html += "<strong>✅ סיימתי!</strong><br>";
  html += "תוקנו: " + success + "<br>";
  if (failed > 0) html += "נכשלו: " + failed + "<br>";
  html += "<br><strong>השלבים הבאים:</strong><br>";
  html += "1. תרעני את האפליקציה (גלישה בסתר)<br>";
  html += "2. תיכנסי ל-💬 תרחישים<br>";
  html += "3. תפתחי 'תשאול וחקירת שטח'<br>";
  html += "4. תלחצי על '🎭 מבוקש המתכחש לזהותו'<br>";
  html += "5. תשמעי את כל ההקלטות!";
  html += "</div>";
  out.innerHTML = html;
  
  btn.textContent = "✓ הושלם";
}

loadPhrases();
</script>
</body>
</html>
