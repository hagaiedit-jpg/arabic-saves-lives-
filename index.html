<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>תיקוני ניקוי</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Heebo', system-ui, sans-serif; background: #0E1B2E; color: #E8D9B8; padding: 20px; min-height: 100vh; }
.container { max-width: 800px; margin: 0 auto; }
h1 { color: #1D9E75; text-align: center; margin-bottom: 20px; }
.step { background: #1F3147; border: 1px solid #1D9E75; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
.step-num { color: #1D9E75; font-weight: 700; font-size: 16px; margin-bottom: 6px; }
.step-text { color: #c0d0e0; font-size: 13px; line-height: 1.6; }
.step-text a { color: #D4A24E; text-decoration: underline; }
.btn { background: #1D9E75; border: none; color: #fff; border-radius: 10px; padding: 14px 28px; font-weight: 700; cursor: pointer; font-family: inherit; display: block; width: 100%; margin: 14px 0; font-size: 16px; }
.btn.done { background: #555; }
#sqlBox { width: 100%; min-height: 250px; background: #000; color: #0F0; font-family: monospace; font-size: 11px; padding: 12px; border-radius: 8px; direction: ltr; text-align: left; }
</style>
</head>
<body>
<div class="container">
  <h1>🧹 ניקוי 2 בעיות קטנות</h1>
  
  <div class="step">
    <div class="step-num">📋 צעד 1</div>
    <div class="step-text">לחצי על הכפתור - יעתיק את ה-SQL</div>
  </div>
  
  <div class="step">
    <div class="step-num">🔗 צעד 2</div>
    <div class="step-text"><a href="https://supabase.com/dashboard/project/ukynfcwxsrzpuqecfjuz/sql/new" target="_blank">פתחי SQL Editor</a></div>
  </div>
  
  <div class="step">
    <div class="step-num">📝 צעד 3</div>
    <div class="step-text">Ctrl+A → Delete → Ctrl+V → RUN<br>תראי את כל הקטגוריות אחרי הניקוי.</div>
  </div>
  
  <button class="btn" onclick="copySQL()" id="copyBtn">📋 העתק את ה-SQL</button>
  
  <textarea id="sqlBox" readonly>-- ===== ניקוי קטגוריות לא במקום =====

-- 1. הסרת 'תפיסת מחבל' מ-daily (שייך לתרחישים)
UPDATE phrases SET section = 'scenario' WHERE section = 'daily' AND cat = 'תפיסת מחבל ללא מתשאל';

-- 2. בדיקה מה יש ב-'סמנטי' (קטגוריה כללית)
SELECT id, cat, he FROM phrases WHERE section = 'semantic' AND cat = 'סמנטי' LIMIT 20;

-- 3. בדיקת תוצאות סופית
SELECT section, cat, COUNT(*) as cnt FROM phrases GROUP BY section, cat ORDER BY section, cnt DESC;</textarea>
</div>
<script>
function copySQL() {
  const box = document.getElementById('sqlBox');
  box.select();
  box.setSelectionRange(0, 999999);
  document.execCommand('copy');
  const btn = document.getElementById('copyBtn');
  btn.textContent = '✅ הועתק!';
  btn.classList.add('done');
  setTimeout(() => { btn.textContent = '📋 העתק שוב'; btn.classList.remove('done'); }, 4000);
}
</script>
</body>
</html>
