<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>עדכון תגיות חיילת</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0E1B2E;color:#fff;font-family:-apple-system,sans-serif;padding:20px;direction:rtl;}
.box{max-width:780px;margin:20px auto;background:#1A2B3C;border:1px solid #2e4558;border-radius:14px;padding:24px;}
h1{color:#D4A24E;font-size:22px;margin-bottom:14px;}
.summary{background:rgba(142,68,173,0.1);border:1px solid #8e44ad;border-radius:10px;padding:14px;margin-bottom:18px;font-size:13px;line-height:1.7;}
.btn{background:#8e44ad;color:#fff;border:none;border-radius:10px;padding:14px 22px;font-size:15px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;margin-top:10px;}
.btn:disabled{background:#666;cursor:not-allowed;}
#out{margin-top:18px;font-size:14px;line-height:1.7;background:#0E1B2E;border:1px solid #2e4558;border-radius:8px;padding:14px;max-height:500px;overflow-y:auto;}
.success{background:rgba(29,158,117,0.15);border:1px solid #1D9E75;color:#7eecc1;padding:8px 12px;border-radius:8px;margin-bottom:6px;}
.error{background:rgba(231,76,60,0.15);border:1px solid #e74c3c;color:#ff9080;padding:8px 12px;border-radius:8px;margin-bottom:6px;}
</style>
</head>
<body>
<div class="box">
  <h1>👩‍✈️ עדכון תגיות חיילת בתרחיש בידוק אישה</h1>
  <div class="summary">
    <strong>מעדכן 5 הודעות של החיילת:</strong><br>
    1. שלום, אני אבדוק אותך, אל תפחדי<br>
    2. פתחי את התיק ואת המעיל<br>
    3. בואי איתי לצד לדקה<br>
    4. הבידוק קצר, רגע אחד וסיימנו<br>
    5. תודה רבה, את יכולה ללכת<br>
    <hr style="border-color:rgba(212,134,46,0.3);margin:10px 0;">
    מוסיף להן tag "<strong>fsoldier</strong>" - כדי שיופיעו בצבע סגול ייחודי בבועה.
  </div>
  <button class="btn" id="updateBtn" onclick="updateTags()">🎨 עדכן את התגיות</button>
  <div id="out"></div>
</div>
<script>
const SUPA_URL = 'https://ukynfcwxsrzpuqecfjuz.supabase.co';
const SUPA_KEY = 'sb_publishable_ugMP9beQh9-TJVGL3uzIAA_xhAgWJQP';
const PHRASES = ["שלום, אני אבדוק אותך, אל תפחדי","פתחי את התיק ואת המעיל","בואי איתי לצד לדקה","הבידוק קצר, רגע אחד וסיימנו","תודה רבה, את יכולה ללכת"];

async function updateTags() {
  const btn = document.getElementById("updateBtn");
  const out = document.getElementById("out");
  btn.disabled = true;
  out.innerHTML = "<div style='color:#D4862E;'>טוען...</div>";
  let updated = 0, failed = 0;
  let html = "";
  
  try {
    // Get all phrases from the בידוק אישה scenario
    const r = await fetch(SUPA_URL + "/rest/v1/phrases?cat=eq.בידוק אישה&select=id,he,tags", {
      headers: {apikey: SUPA_KEY, Authorization: "Bearer " + SUPA_KEY}
    });
    const phrases = await r.json();
    
    for (const targetHe of PHRASES) {
      const match = phrases.find(p => p.he === targetHe);
      if (!match) {
        html += "<div class='error'>✗ לא נמצא: " + targetHe + "</div>";
        failed++;
        continue;
      }
      
      // Replace "soldier" with "fsoldier" in tags
      let newTags = (match.tags || "").replace(/\bsoldier\b/g, "fsoldier");
      // If fsoldier wasn't there, add it
      if (newTags.indexOf("fsoldier") === -1) {
        newTags = newTags + " fsoldier";
      }
      newTags = newTags.trim();
      
      try {
        const resp = await fetch(SUPA_URL + "/rest/v1/phrases?id=eq." + match.id, {
          method: "PATCH",
          headers: {
            apikey: SUPA_KEY,
            Authorization: "Bearer " + SUPA_KEY,
            "Content-Type": "application/json",
            Prefer: "return=representation"
          },
          body: JSON.stringify({tags: newTags})
        });
        
        if (resp.ok) {
          html += "<div class='success'>✓ " + targetHe + " (tag: " + newTags + ")</div>";
          updated++;
        } else {
          const errText = await resp.text();
          html += "<div class='error'>✗ " + targetHe + " - " + errText + "</div>";
          failed++;
        }
      } catch(e) {
        html += "<div class='error'>✗ " + targetHe + " - " + e.message + "</div>";
        failed++;
      }
      out.innerHTML = html;
      await new Promise(r => setTimeout(r, 100));
    }
    
    html += "<div style='margin-top:14px;padding:12px;background:rgba(29,158,117,0.15);border:1px solid #1D9E75;border-radius:8px;'>";
    html += "<strong>סיכום:</strong><br>✓ עודכנו: " + updated + "<br>";
    if (failed > 0) html += "✗ נכשלו: " + failed + "<br>";
    html += "</div>";
    out.innerHTML = html;
  } catch(e) {
    out.innerHTML = "<div class='error'>שגיאה: " + e.message + "</div>";
  } finally {
    btn.disabled = false;
    btn.textContent = "✓ סיים";
  }
}
</script>
</body>
</html>
