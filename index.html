<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Heebo', system-ui, sans-serif; background: linear-gradient(135deg, #0E1B2E 0%, #1A2B3C 100%); color: #E8D9B8; padding: 20px; min-height: 100vh; }
.container { max-width: 700px; margin: 0 auto; }
.header { text-align: center; margin-bottom: 30px; }
.header h1 { color: #8e44ad; font-size: 26px; margin-bottom: 8px; }
.card { background: linear-gradient(135deg, #1F3147 0%, #243a55 100%); border: 1px solid rgba(142,68,173,0.3); border-radius: 14px; padding: 24px; margin-bottom: 20px; }
.card h2 { color: #8e44ad; font-size: 16px; margin-bottom: 12px; }
.line { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
.line:last-child { border-bottom: none; }
.btn { background: linear-gradient(135deg, #8e44ad 0%, #6c3483 100%); border: none; color: #fff; border-radius: 10px; padding: 14px 28px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; display: block; width: 100%; }
.btn:disabled { background: #555; cursor: not-allowed; }
.status { padding: 14px; margin: 16px 0; border-radius: 10px; text-align: center; font-size: 14px; display: none; }
.status.success { background: rgba(29,158,117,0.15); color: #1D9E75; }
.status.loading { background: rgba(212,162,78,0.15); color: #D4A24E; }
.progress { width: 100%; height: 10px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; margin-top: 12px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #8e44ad, #D4A24E); width: 0%; transition: width 0.3s; }
</style>

  </div>

    <h2>📊 פירוט</h2>
    <div class="line"><span>🕌 אסלאם וחגים</span><span style="color:#D4A24E;font-weight:700;">4</span></div>
    <div class="line"><span>👨‍👩‍👧 כבוד ומשפחה</span><span style="color:#D4A24E;font-weight:700;">5</span></div>
    <div class="line"><span>🤝 כללי כבוד בחברה הערבית</span><span style="color:#D4A24E;font-weight:700;">4</span></div>
    <div class="line" style="border-top:1px solid #8e44ad;padding-top:10px;margin-top:10px;"><span><strong>סה"כ</strong></span><span style="color:#D4A24E;font-weight:700;">13</span></div>

</div>

<script>
const SUPABASE_URL = 'https://ukynfcwxsrzpuqecfjuz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ugMP9beQh9-TJVGL3uzIAA_xhAgWJQP';
const ITEMS = JSON.parse('[\n  {\n    "cat": "אסלאם וחגים",\n    "he": "🕋 חאג\' ועומרה",\n    "why": "רקע תרבותי\\n\\nהחאג\' (الحج) הוא צליינות שנתית למכה בחודש ד\'ו אלחג\'ה - חובה דתית למי שיכול, פעם אחת בחיים. העומרה (العمرة) היא צליינות קצרה יותר שניתן לעשות כל השנה.\\n\\nהקשר ללוחם:\\n• מי שעשה חאג\' זוכה לתואר \\"חאג\'\\" - מעמד גבוה בחברה\\n• בעונת החאג\' (כ-5 שבועות) - תנועה מוגברת בשדות תעופה ומעברי גבול\\n• המשפחה מקבלת את החזר בטקס - קליטה רבת אנשים\\n• ביטוי כבוד: \\"חאג\' פלאן\\" - מתנהג אחרת מאזרח רגיל\\n• מטיילים בקבוצות לרוב, אפשר לזהות לפי לבוש לבן (אִחְרָאם)"\n  },\n  {\n    "cat": "אסלאם וחגים",\n    "he": "🌙 חודש מוחרם וצום עאשורא",\n    "why": "רקע תרבותי\\n\\nמוחרם הוא החודש הראשון בלוח המוסלמי, אחד מ-4 החודשים הקדושים. ה-10 בחודש - \\"עאשורא\\" - הוא יום צום וזיכרון, חשוב במיוחד לשיעים (מציין את מות חוסיין בקרב כרבלא).\\n\\nהקשר ללוחם:\\n• עבור שיעים - יום אבל לאומי-דתי, מצעדים, חבטות ראש (לתימה)\\n• עבור סונים - יום צום של מצווה (לא חובה)\\n• במחנות פליטים שיעיים בלבנון/סוריה - אווירה מתוחה\\n• להימנע מאלימות בחודש זה - נחשב לחילול קדושה\\n• ברכה מוסלמית: \\"כל סנה ואנת בח\'יר\\" (לא \\"עיד מבארכ\\")"\n  },\n  {\n    "cat": "אסלאם וחגים",\n    "he": "🚫 איסור חזיר ואלכוהול",\n    "why": "רקע תרבותי\\n\\nבאסלאם, חזיר (ח\'נזיר) ואלכוהול (ח\'מר) הם \\"חראם\\" - אסורים מן התורה. גם נגיעה בכלי שהכיל חזיר נחשבת לטומאה. אלכוהול אסור גם לקנייה, מכירה ולנוכחות באירוע שמוגש בו.\\n\\nהקשר ללוחם:\\n• בכפר ערבי - לא להציע אוכל לא-כשר. גם שוקולד עם ג\'לטין חזיר אסור\\n• אם אזרח אומר \\"מַא בָּאשְׁרַבּ\\" (אני לא שותה) - לא ללחוץ, זו עמדה דתית\\n• בחיפוש בבית - להתחשב אם יש חשד שמוצר טמא נכנס\\n• אם יש קצב לא-מוסלמי בכפר - הם נחשבים כופרים בעיני המוסלמים\\n• להימנע מאזכור בשר חזיר בפני אדם דתי"\n  },\n  {\n    "cat": "אסלאם וחגים",\n    "he": "🤲 חמש תפילות יומיות",\n    "why": "רקע תרבותי\\n\\nהמוסלמים מתפללים 5 פעמים ביום בזמנים קבועים: פג\'ר (לפני זריחה), טוהר (צהריים), עסר (אחר-צהריים), מע\'רב (שקיעה), עִשַׁא (לילה). הקריאה לתפילה (אַדָאן) נשמעת מהמסגדים.\\n\\nהקשר ללוחם:\\n• בזמן תפילה הרחובות מתרוקנים לכמה דקות\\n• אם רואים אדם מתפלל - לא להפריע (3-5 דקות)\\n• בחיפוש או תשאול - לחכות לסיום התפילה\\n• זמני התפילה משתנים לפי השעה והעונה - לדעת את הזמן הקרוב\\n• הקריאה לתפילה היא הזדמנות להעריך עומק הדתיות בכפר"\n  },\n  {\n    "cat": "כבוד ומשפחה",\n    "he": "💍 חתונה ומסיבת חינה",\n    "why": "רקע תרבותי\\n\\nחתונה ערבית היא אירוע משפחתי גדול - מאות אורחים, ימים שלמים של חגיגות. לפני החתונה: \\"ליל הח\'ינה\\" - הצביעה של ידי הכלה בחינה (עשבי תיבול). המסיבה כוללת זיקוקי דינור (אבוקות).\\n\\nהקשר ללוחם:\\n• זיקוקים בחתונות יכולים להישמע כירי - לבדוק לפני תגובה\\n• אורחים מגיעים מכל המשפחה המורחבת - אנשים זרים בעיר\\n• אסור להפריע לחתונה - יכול ליצור חיכוך אזרחי קשה\\n• ברכה למשפחת החתן: \\"מַבְּרוּכּ\\" + \\"אלף מבארכ\\"\\n• בערב חתונה - לא לערוך פעילות בשכונה הזו"\n  },\n  {\n    "cat": "כבוד ומשפחה",\n    "he": "👶 טקסי לידה ובן השנה",\n    "why": "רקע תרבותי\\n\\nלידת בן (במיוחד הראשון) - שמחה גדולה. ביום השביעי - טקס \\"עקיקה\\" (שחיטת כבש). אחרי שנה - \\"בן השנה\\" עם תספורת ראשונה. הכרזת השם בלידה: \\"מַבְּרוּכּ\\" + הוספת שם האב לאם: \\"אֻם פלאן\\".\\n\\nהקשר ללוחם:\\n• בית עם תינוק חדש - תנועה רבה של מבקרי משפחה\\n• האם הופכת ל\\"אֻם פלאן\\" (אם של X) - שינוי בכינוי\\n• להתחשב באם בהיריון מתקדם בחיפוש או מחסום\\n• ברכה ללידה: \\"אַלְלָה יִחְפַצֹה\\" (אלוהים ישמור עליו)\\n• לבן יש קדימות תרבותית - שיקול בעדינות"\n  },\n  {\n    "cat": "כבוד ומשפחה",\n    "he": "⚰️ טקסי אבל וקבורה",\n    "why": "רקע תרבותי\\n\\nבאסלאם, קבורה מהירה - תוך 24 שעות מהמוות. הגוויה נשטפת, עטופה בבד לבן. ימי אבל: 3 ימים ראשונים (תַעַזִיֶה), אחר כך 40 יום (אַרְבַּעִין). הנשים יכולות לבכות בקול, אסור להן ללבוש שחור (לעדות שונות).\\n\\nהקשר ללוחם:\\n• בית אבל - לא לפעול שם אלא במקרה קריטי\\n• המון מרובה מגיע לתעזיה - תנועה רבה בכפר\\n• ברכת ניחומים: \\"אַלְלָה יְרַחְמֹה\\" (אלוהים ירחם עליו) או \\"אַלבָּקִיֶּה פִי חַיָאתַכּ\\"\\n• 40 יום אחרי - שוב התקהלות לציון\\n• להתחשב במשפחה אבלה - להאריך זמן ולסבלנות"\n  },\n  {\n    "cat": "כבוד ומשפחה",\n    "he": "🏠 חצר משותפת (חוש)",\n    "why": "רקע תרבותי\\n\\nבכפרים ערביים מסורתיים, מספר בתים של אותה משפחה (\\"חמולה\\") חולקים חצר משותפת (\\"חוש\\" - حوش). כל אח גר עם משפחתו בבית נפרד אבל חצר אחת. הזקנה (אם המשפחה) בדרך כלל בבית המרכזי.\\n\\nהקשר ללוחם:\\n• כניסה ל\\"חוש\\" - חצי מהכפר ידע תוך דקות\\n• יש לדפוק על שער החצר, לא להיכנס ישר\\n• בני המשפחה מגנים זה על זה - מבצע באחד מהבתים יוצא גם נגד האחרים\\n• הזקנה היא מקור מידע - לדעת איך לפנות אליה בכבוד\\n• ביציאה מ\\"חוש\\" - לוודא שלא נכנסים שכנים בעלבון"\n  },\n  {\n    "cat": "כבוד ומשפחה",\n    "he": "👨 מעמד הבן הבכור",\n    "why": "רקע תרבותי\\n\\nבחברה הערבית, הבן הבכור (\\"אִבְּן אִלבִּכּר\\") יורש את האחריות על המשפחה. כינוי האב לפי שם הבן הבכור: \\"אַבּוּ פלאן\\". בקבלת אבל - הוא מקבל את הניחומים. בחתונה - הוא מתחתן ראשון.\\n\\nהקשר ללוחם:\\n• להזדהות מי הבכור - מקור מידע וכוח במשפחה\\n• פנייה לאב כ\\"אַבּוּ-X\\" (שם הבכור) - מבטא כבוד ותחקיר ידע\\n• הבכור אחראי על אחיותיו - גם בחתונה, גם בכבוד\\n• אם הבכור מסכים - כל המשפחה תשתף פעולה\\n• הוא ייתן את הסיפור הנכון לפני שאחרים מדברים"\n  },\n  {\n    "cat": "כללי כבוד בחברה הערבית",\n    "he": "☕ טקס הקפה הערבי",\n    "why": "רקע תרבותי\\n\\nקפה ערבי (קַהְוֶה סָאדֶה - בלי סוכר, עם הל) הוא סמל הכנסת אורחים. מוגש בכוסות קטנות (פִנְגָ\'אן). 3 כוסות הן מקסימום של הנימוס. סירוב יחשב כעלבון לבעל הבית.\\n\\nהקשר ללוחם:\\n• בחיפוש ארוך / שיחה - קבלת קפה היא הזדמנות לבנות אמון\\n• להזיז את הכוס מצד לצד = \\"מספיק\\" (לא \\"עוד אחת\\")\\n• מי שמגיש מקבל כבוד - לעיתים זקן המשפחה\\n• הכוס הראשונה מוצעת לאורח הבכיר\\n• \\"תְפַצַّל אַלְקַהְוֶה\\" - הזמנה לקפה, אינדיקציה שאתה מקובל"\n  },\n  {\n    "cat": "כללי כבוד בחברה הערבית",\n    "he": "🚭 נרגילה (אג\'מי)",\n    "why": "רקע תרבותי\\n\\nעישון נרגילה (\\"אַרְגִ\'ילֶה\\" / \\"שִישֶה\\") הוא סמל של אירוח ופנאי. גברים מתאספים סביב נרגילה לשעות של שיחה. בכפר/עיר - בבתי קפה. בבית - אחרי ארוחת ערב.\\n\\nהקשר ללוחם:\\n• מעגל אנשים סביב נרגילה - מקום לאיסוף מידע\\n• בית עם נרגילה דולקת - אורחים נמצאים בבית\\n• להציע גחלת לאיש זקן - מחווה של כבוד\\n• אישה לא תעשן נרגילה בנוכחות זרים (פגיעה בכבוד)\\n• מעבר נרגילה משמאל לימין - מנהג עתיק לכבוד"\n  },\n  {\n    "cat": "כללי כבוד בחברה הערבית",\n    "he": "🎁 קבלת ומתן מתנות",\n    "why": "רקע תרבותי\\n\\nקבלת מתנה נמדדת בכבוד. ראוי לסרב פעמיים-שלוש לפני הקבלה (זה מנומס). מתנה ניתנת ביד ימין, מתקבלת בשתי ידיים. פתיחה מיד נחשבת חוסר נימוס - לפתוח אחרי שהאורח עזב.\\n\\nהקשר ללוחם:\\n• אם אזרח מציע משהו - לסרב באדיבות פעם או פעמיים (לא ישר)\\n• לא לקבל מתנה מהותית - יכולה להיתפס כשוחד\\n• מתנה קטנה (כיבוד, מים) - אפשר לקבל בכבוד\\n• \\"שֻׁכְּרַן, מָא בַּקְדַר\\" (תודה, אני לא יכול) - סירוב מכובד\\n• אם מתעקש - \\"פַעם אֻחְרָא, אִנְשָׁאאַלְלָה\\" (פעם אחרת, בעזרת השם)"\n  },\n  {\n    "cat": "כללי כבוד בחברה הערבית",\n    "he": "🗣️ קללות וכינויי גנאי",\n    "why": "רקע תרבותי\\n\\nבערבית יש קללות עם משקל דתי-משפחתי כבד. \\"כּלב\\" (כלב) - עלבון רגיל. \\"אִבְּן אִלכַּלְבּ\\" - חמור הרבה יותר (פגיעה באם). פגיעה בכבוד האם או האחות יכולה להוביל לאלימות מיידית.\\n\\nהקשר ללוחם:\\n• לעולם לא להעליב את אם / אחות / אישה של אזרח - תגרור עימות\\n• אם אזרח קילל - לא להגיב באותו האופן\\n• \\"אַחו פלאן\\" (אחיו של X) - לא קללה\\n• \\"יַא חַיוואן\\" (חיה) - עלבון בינוני\\n• אם אזרח קילל אותך באם - תיעוד מיידי, יכול להיות הקדמה לאלימות"\n  }\n]');

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.className = 'status ' + (type || '');
  el.textContent = msg;
  el.style.display = 'block';
}

async function uploadAll() {
  const btn = document.getElementById('uploadBtn');
  btn.disabled = true;
  showStatus('⏳ מעלה...', 'loading');
  
  let success = 0;
  let failed = 0;
  
  for (let i = 0; i < ITEMS.length; i++) {
    const item = ITEMS[i];
    try {
      const payload = {
        cat: item.cat,
        section: 'customs',
        he: item.he,
        why: item.why
      };
      
      const res = await fetch(SUPABASE_URL + '/rest/v1/phrases', {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(payload)
      });
      
      if (res.ok) success++;
      else { failed++; console.error('Failed:', item.he, await res.text()); }
    } catch (e) {
      failed++; console.error(e);
    }
    
    document.getElementById('progressFill').style.width = (((i+1) / ITEMS.length) * 100) + '%';
    showStatus('הועלו ' + success + '/' + ITEMS.length, 'loading');
    
    await new Promise(r => setTimeout(r, 80));
  }
  
  if (failed === 0) {
    showStatus('✅ כל ' + success + ' המנהגים הועלו! רעני את האפליקציה.', 'success');
  } else {
    showStatus('⚠️ הצליחו: ' + success + ', נכשלו: ' + failed, 'success');
  }
  
  btn.disabled = false;
}
</script>
</body>
</html>
