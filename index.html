<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>העלאת תרחיש "מבוקש מתכחש"</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0E1B2E;color:#fff;font-family:-apple-system,sans-serif;padding:20px;direction:rtl;}
.box{max-width:850px;margin:20px auto;background:#1A2B3C;border:1px solid #2e4558;border-radius:14px;padding:24px;}
h1{color:#D4A24E;font-size:22px;margin-bottom:14px;}
h2{color:#1D9E75;font-size:15px;margin-bottom:8px;margin-top:18px;}
.intro{background:rgba(29,158,117,0.1);border:1px solid #1D9E75;border-radius:10px;padding:14px;margin-bottom:18px;font-size:13px;line-height:1.7;}
.step{background:#0E1B2E;border:1px solid #2e4558;border-radius:10px;padding:12px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;}
.step-num{background:#1F3147;color:#D4A24E;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
.step.soldier{border-right:3px solid #1D9E75;}
.step.civilian{border-right:3px solid #c0392b;}
.step-speaker{font-size:11px;font-weight:700;margin-bottom:4px;}
.step.soldier .step-speaker{color:#1D9E75;}
.step.civilian .step-speaker{color:#c0392b;}
.step-content{flex:1;}
.step-he{color:#D4A24E;font-weight:700;font-size:14px;margin-bottom:3px;}
.step-trans{color:#a0b8c8;font-family:Georgia,serif;font-size:12px;}
.step-ar{color:#fff;font-size:13px;}
label{display:block;font-size:13px;color:#E8D9B8;margin-bottom:6px;margin-top:10px;}
input,select{width:100%;padding:10px;background:#0E1B2E;border:1px solid #2e4558;color:#fff;border-radius:8px;font-family:inherit;font-size:13px;}
.btn{background:#1D9E75;color:#fff;border:none;border-radius:10px;padding:14px 22px;font-size:15px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;margin-top:18px;}
.btn:disabled{background:#666;cursor:not-allowed;}
#out{margin-top:18px;font-size:14px;line-height:1.7;background:#0E1B2E;border:1px solid #2e4558;border-radius:8px;padding:14px;max-height:500px;overflow-y:auto;}
.success{background:rgba(29,158,117,0.15);border:1px solid #1D9E75;color:#7eecc1;padding:8px 12px;border-radius:8px;margin-bottom:6px;}
.error{background:rgba(231,76,60,0.15);border:1px solid #e74c3c;color:#ff9080;padding:8px 12px;border-radius:8px;margin-bottom:6px;}
</style>
</head>
<body>
<div class="box">
  <h1>📤 העלאת תרחיש: מבוקש מתכחש לזהותו</h1>
  
  <div class="intro">
    <strong>תרחיש לטאב 💬 תרחישים, קטגוריה "תשאול וחקירת שטח":</strong><br>
    הכוח הגיע לבית של מבוקש. המבוקש יוצא, אך טוען שהוא רק אורח עם שם בדוי.<br>
    בהמשך הוא חושף מידע על הבית שמסגיר את שקריו ולבסוף מודה.<br>
    <br>
    <strong>15 משפטים - דיאלוג חייל ↔ מבוקש</strong>
  </div>
  
  <h2>📋 תצוגה מקדימה:</h2>
  <div id="preview"></div>
  
  <button class="btn" id="uploadBtn" onclick="upload()">🚀 העלה תרחיש (15 משפטים)</button>
  <div id="out"></div>
</div>

<script>
const SUPA_URL = 'https://ukynfcwxsrzpuqecfjuz.supabase.co';
const SUPA_KEY = 'sb_publishable_ugMP9beQh9-TJVGL3uzIAA_xhAgWJQP';
const STEPS = [{"step": 1, "speaker": "soldier", "he": "מי אתה? איך קוראים לך?", "trans": "מִין אִנְתַ? שׁוּ אִסְמַכּ?", "ar": "مين انت؟ شو اسمك؟"}, {"step": 2, "speaker": "civilian", "he": "אני אחמד, אורח כאן", "trans": "אַנָא אַחְמַד, אַנָא צֵ'יְף הוֹן", "ar": "أنا أحمد، أنا ضيف هون"}, {"step": 3, "speaker": "soldier", "he": "תעודת הזהות שלך, בבקשה", "trans": "הַוִיְּתַכּ, מִן פַצְ'לַכּ", "ar": "هويتك، من فضلك"}, {"step": 4, "speaker": "civilian", "he": "שכחתי אותה בבית", "trans": "נְסִיתְהָא בִּלבֵּית", "ar": "نسيتها بالبيت"}, {"step": 5, "speaker": "soldier", "he": "כמה זמן אתה כאן?", "trans": "קַדֵּישׁ צַארלַכּ הוֹן?", "ar": "قديش صارلك هون؟"}, {"step": 6, "speaker": "civilian", "he": "הגעתי הבוקר, פעם ראשונה", "trans": "וְצִלְת אִלצֻּבֵּח, אַוַּל מַרַּה", "ar": "وصلت الصبح، أول مرة"}, {"step": 7, "speaker": "soldier", "he": "מי בעל הבית?", "trans": "מִין צָאחֵבּ אִלבֵּית?", "ar": "مين صاحب البيت؟"}, {"step": 8, "speaker": "civilian", "he": "מחמד, חבר שלי", "trans": "מְחַמַּד, צָאחְבִּי", "ar": "محمد، صاحبي"}, {"step": 9, "speaker": "soldier", "he": "תאר לי את החדרים בבית", "trans": "אוֹצֵף לִי אִלע'ֻרַף פִי אִלבֵּית", "ar": "أوصف لي الغرف في البيت"}, {"step": 10, "speaker": "civilian", "he": "החדר השני משמאל הוא של הילדים", "trans": "אִלאוֹצַ'ה אִתָּ'אנְיֵה עַלשַׁמָאל לַלוְלָאד", "ar": "الأوضة الثانية عالشمال للولاد"}, {"step": 11, "speaker": "soldier", "he": "איך אתה יודע את זה אם זו פעם ראשונה?", "trans": "כִּיף בִּתַעְרֵף וְאִנְתַ אַוַּל מַרַּה הוֹן פִי אִלבֵּית?", "ar": "كيف بتعرف وانت أول مرة هون في البيت؟"}, {"step": 12, "speaker": "civilian", "he": "ראיתי כשנכנסתי, חבר שלי הראה לי", "trans": "שׁוּפֵת לַמָּא פַתֵּת, צָאחְבִּי וַרָּאנִי", "ar": "شفت لما فتت، صاحبي وراني"}, {"step": 13, "speaker": "soldier", "he": "תשמע, אנחנו יודעים מי אתה. תגיד לי את האמת", "trans": "אִסְמַע, אִחְנָא מְנַעְרֵף מִין אִנְתַ. אִחְכִּי אִלחַקִיקַה", "ar": "اسمع، احنا منعرف مين انت. احكي الحقيقة"}, {"step": 14, "speaker": "civilian", "he": "טוב... אני גר כאן. אל תפגע במשפחה שלי", "trans": "טַיֵּבּ... אַנָא סָאכֵּן הוֹן. לָא תְאַד'י עֵילְתִי", "ar": "طيب... أنا ساكن هون. لا تأذي عيلتي"}, {"step": 15, "speaker": "soldier", "he": "בוא איתנו לחקירה. שום דבר לא יקרה לך", "trans": "תַעַאל מַעְנָא עַלתַּחְקִיק. מֵשׁ רַח יְצִיר אִשִּי אִדָ'א תִגִ'י מַעְנָא עַלתַּחְקִיק", "ar": "تعال معنا عالتحقيق. مش رح يصير اشي اذا تجي معنا عالتحقيق"}];

// Show preview
const preview = document.getElementById("preview");
let html = "";
STEPS.forEach(s => {
  const speakerClass = s.speaker === "soldier" ? "soldier" : "civilian";
  const speakerLabel = s.speaker === "soldier" ? "👮 חייל" : "👤 מבוקש";
  html += '<div class="step ' + speakerClass + '">';
  html += '<div class="step-num">' + s.step + '</div>';
  html += '<div class="step-content">';
  html += '<div class="step-speaker">' + speakerLabel + '</div>';
  html += '<div class="step-he">' + s.he + '</div>';
  html += '<div class="step-trans">' + s.trans + '</div>';
  html += '<div class="step-ar">' + s.ar + '</div>';
  html += '</div></div>';
});
preview.innerHTML = html;

async function upload() {
  const btn = document.getElementById("uploadBtn");
  const out = document.getElementById("out");
  
  btn.disabled = true;
  out.innerHTML = "<div style='color:#D4862E;'>טוען...</div>";
  let html = "";
  let success = 0, failed = 0;
  
  for (const step of STEPS) {
    // Build tags - MUST include "stepN" for scenario steps
    const tags = step.speaker === "soldier" 
      ? "@soldier step" + step.step
      : "@civilian step" + step.step;
    
    const phraseData = {
      he: step.he,
      trans: step.trans,
      ar: step.ar,
      cat: "מבוקש מתכחש",
      section: "scenario",
      tags: tags,
      why: step.speaker === "soldier" ? "חייל - שלב " + step.step : "מבוקש - שלב " + step.step,
      urgency: 3,
      tone: step.speaker === "soldier" ? "authoritative" : "evasive"
    };
    
    try {
      const resp = await fetch(SUPA_URL + "/rest/v1/phrases", {
        method: "POST",
        headers: {
          apikey: SUPA_KEY,
          Authorization: "Bearer " + SUPA_KEY,
          "Content-Type": "application/json",
          Prefer: "return=representation"
        },
        body: JSON.stringify(phraseData)
      });
      
      if (resp.ok) {
        const data = await resp.json();
        const icon = step.speaker === "soldier" ? "👮" : "👤";
        html += "<div class='success'>✓ " + icon + " שלב " + step.step + ": " + step.he + "</div>";
        success++;
      } else {
        const errText = await resp.text();
        html += "<div class='error'>✗ שלב " + step.step + " - " + errText + "</div>";
        failed++;
      }
    } catch(e) {
      html += "<div class='error'>✗ שלב " + step.step + " - " + e.message + "</div>";
      failed++;
    }
    out.innerHTML = html;
    await new Promise(r => setTimeout(r, 200));
  }
  
  html += "<div style='margin-top:14px;padding:12px;background:rgba(29,158,117,0.15);border:1px solid #1D9E75;border-radius:8px;'>";
  html += "<strong>סיכום:</strong><br>✓ הצליחו: " + success + "<br>";
  if (failed > 0) html += "✗ נכשלו: " + failed + "<br>";
  html += "<br><strong>שלבים הבאים:</strong><br>";
  html += "1. רענני את האפליקציה<br>";
  html += "2. תיכנסי ל-💬 תרחישים<br>";
  html += "3. תפתחי קטגוריה <strong>תשאול וחקירת שטח</strong><br>";
  html += "4. תלחצי על <strong>🎭 מבוקש המתכחש לזהותו</strong><br>";
  html += "5. תקליטי את 15 המשפטים בקלאודינרי";
  html += "</div>";
  out.innerHTML = html;
  
  btn.disabled = false;
  btn.textContent = "✓ סיים";
}
</script>
</body>
</html>
