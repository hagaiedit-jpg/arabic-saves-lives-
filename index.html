<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Fix Final</title></head>
<body style="font-family:sans-serif;padding:20px;direction:rtl;">
<h2>עיצוב מצב מהיר</h2>
<button onclick="fixCode()" style="padding:15px 30px;background:#27ae60;border:none;border-radius:8px;color:#fff;font-size:16px;cursor:pointer;">🔧 תקן</button>
<div id="status" style="margin:15px 0;font-size:14px;"></div>
<textarea id="result" style="width:100%;height:400px;font-size:11px;font-family:monospace;display:none;direction:ltr;"></textarea>
<button id="copyBtn" onclick="copyCode()" style="display:none;padding:12px 30px;background:#27ae60;border:none;border-radius:8px;color:#fff;font-size:14px;cursor:pointer;margin-top:10px;">📋 העתק הכל</button>
<script>
function removeFunc(code, name){
  var s = code.indexOf('function ' + name + '(');
  if(s === -1) return code;
  var b = code.indexOf('{', s);
  if(b === -1) return code;
  var d=0, e=b;
  for(var i=b; i<code.length; i++){
    if(code[i]==='{') d++;
    if(code[i]==='}') d--;
    if(d===0){e=i;break;}
  }
  var after=e+1;
  while(after<code.length && (code[after]==='\n'||code[after]==='\r')) after++;
  return code.substring(0,s)+code.substring(after);
}

async function fixCode(){
  var st=document.getElementById('status');
  st.textContent='טוען...';
  try{
    var res=await fetch('https://raw.githubusercontent.com/hagaiedit-jpg/arabic-saves-lives-/main/index.html');
    var code=await res.text();
    var fixes=0;

    // Remove old rQK and playQK
    while(code.includes('function rQK')){code=removeFunc(code,'rQK');fixes++;}
    while(code.includes('function playQK')){code=removeFunc(code,'playQK');fixes++;}

    // New rQK with equal sizes + elegant button with stop
    var newFuncs='\nfunction rQK(){\n';
    newFuncs+='  var items=DB.filter(function(d){return d.cat==="מצב מהיר";});\n';
    newFuncs+='  var el=document.getElementById("qklist");\n';
    newFuncs+='  if(!el)return;\n';
    newFuncs+='  if(!items.length){el.innerHTML=\'<div class="empty">אין משפטים עדיין</div>\';return;}\n';
    newFuncs+='  var h="";\n';
    newFuncs+='  for(var j=0;j<items.length;j++){\n';
    newFuncs+='    var p=items[j],idx=DB.indexOf(p);\n';
    newFuncs+='    h+=\'<div style="background:#223344;border:1px solid #2e4558;border-radius:10px;padding:14px;margin-bottom:10px;border-right:4px solid #c0392b;">\';\n';
    newFuncs+='    h+=\'<div style="color:#fff;font-size:15px;font-weight:600;margin-bottom:4px;">\'+p.he+\'</div>\';\n';
    newFuncs+='    h+=\'<div style="color:#fff;font-size:15px;margin-bottom:4px;font-family:Georgia,serif;">\'+p.trans+\'</div>\';\n';
    newFuncs+='    h+=\'<div style="color:#D2B48C;font-size:14px;margin-bottom:8px;font-family:Georgia,serif;">\'+p.ar+\'</div>\';\n';
    newFuncs+='    h+=\'<button id="qbtn\'+idx+\'" onclick="playQK(\'+idx+\')" style="padding:6px 16px;background:transparent;border:1px solid #c0392b;border-radius:20px;color:#c0392b;font-size:13px;cursor:pointer;font-family:inherit;">🔊 השמע</button>\';\n';
    newFuncs+='    h+=\'</div>\';\n';
    newFuncs+='  }\n';
    newFuncs+='  el.innerHTML=h;\n';
    newFuncs+='}\n';
    newFuncs+='function playQK(i){\n';
    newFuncs+='  var btn=document.getElementById("qbtn"+i);\n';
    newFuncs+='  if(curAudio && !curAudio.paused){\n';
    newFuncs+='    curAudio.pause();curAudio=null;\n';
    newFuncs+='    if(window._qkBtn)window._qkBtn.innerHTML="🔊 השמע";\n';
    newFuncs+='    if(window._qkBtn===btn){window._qkBtn=null;return;}\n';
    newFuncs+='  }\n';
    newFuncs+='  var u=DB[i].audio;\n';
    newFuncs+='  if(!u)return;\n';
    newFuncs+='  var a=new Audio(u);\n';
    newFuncs+='  a.playbackRate=1;\n';
    newFuncs+='  a.play();\n';
    newFuncs+='  curAudio=a;\n';
    newFuncs+='  window._qkBtn=btn;\n';
    newFuncs+='  btn.innerHTML="⏹ עצור";\n';
    newFuncs+='  a.onended=function(){btn.innerHTML="🔊 השמע";curAudio=null;window._qkBtn=null;};\n';
    newFuncs+='}\n';

    var ldPos=code.lastIndexOf('\nloadData();');
    if(ldPos>-1){
      code=code.substring(0,ldPos)+newFuncs+code.substring(ldPos);
      fixes++;
    }

    // Make sure rQK() in loadData
    if(code.includes('renderDict();') && !code.includes('renderDict();rQK();')){
      code=code.replace('renderDict();','renderDict();rQK();');
    }

    st.innerHTML='✓ עברית: 15px מודגש<br>✓ תעתיק: 15px רגיל (אותו גודל)<br>✓ כפתור עדין עם אפשרות עצירה';
    document.getElementById('result').value=code;
    document.getElementById('result').style.display='block';
    document.getElementById('copyBtn').style.display='inline-block';
    st.innerHTML+='<br><br>1. לחצי "📋 העתק הכל"<br>2. פתחי: <a href="https://github.com/hagaiedit-jpg/arabic-saves-lives-/edit/main/index.html" target="_blank">GitHub Editor</a><br>3. Ctrl+A → Delete → Ctrl+V → Commit';
  }catch(e){st.textContent='שגיאה: '+e.message;}
}
function copyCode(){
  var ta=document.getElementById('result');
  ta.select();ta.setSelectionRange(0,99999999);
  navigator.clipboard.writeText(ta.value).then(function(){
    document.getElementById('copyBtn').textContent='✓ הועתק!';
    document.getElementById('copyBtn').style.background='#1D9E75';
  });
}
</script>
</body>
</html>
