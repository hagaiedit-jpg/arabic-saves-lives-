<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Fix Quick Mode</title></head>
<body style="font-family:sans-serif;padding:20px;direction:rtl;">
<h2>שיפור מצב מהיר</h2>
<p>1. הסרת כפתור צב (רק ארנב) 2. תעתיק בולט במקום ערבית</p>
<button onclick="fixCode()" style="padding:15px 30px;background:#c0392b;border:none;border-radius:8px;color:#fff;font-size:16px;cursor:pointer;">🔧 תקן</button>
<div id="status" style="margin:15px 0;font-size:14px;"></div>
<textarea id="result" style="width:100%;height:400px;font-size:11px;font-family:monospace;display:none;direction:ltr;"></textarea>
<button id="copyBtn" onclick="copyCode()" style="display:none;padding:12px 30px;background:#27ae60;border:none;border-radius:8px;color:#fff;font-size:14px;cursor:pointer;margin-top:10px;">📋 העתק הכל</button>

<script>
async function fixCode(){
  const status = document.getElementById('status');
  status.textContent = 'טוען קוד מ-GitHub...';
  
  try{
    const res = await fetch('https://raw.githubusercontent.com/hagaiedit-jpg/arabic-saves-lives-/main/index.html');
    let code = await res.text();
    status.textContent = 'מתקן...';
    let fixes = 0;

    // Find the rQK function and replace it
    const oldCardTemplate = `'<div style="background:#223344;border:1px solid #2e4558;border-radius:10px;padding:14px;margin-bottom:10px;border-right:4px solid #c0392b;">'+
      '<div style="color:#fff;font-size:15px;font-weight:600;margin-bottom:6px;">'+p.he+'</div>'+
      '<div style="color:#D2B48C;font-size:15px;font-family:Georgia,serif;margin-bottom:4px;">'+p.trans+'</div>'+
      '<div style="color:#a0b8c8;font-size:17px;text-align:center;margin-bottom:10px;font-family:Georgia,serif;">'+p.ar+'</div>'+
      '<div style="display:flex;gap:8px;">'+
        '<button onclick="playQK('+i+',0.7)" style="flex:1;padding:10px;background:#D2B48C;border:none;border-radius:8px;color:#412402;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">🐢 צב</button>'+
        '<button onclick="playQK('+i+',1)" style="flex:1;padding:10px;background:#FF8C00;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">🐇 ארנב</button>'+
      '</div>'+
    '</div>'`;

    const newCardTemplate = `'<div style="background:#223344;border:1px solid #2e4558;border-radius:10px;padding:14px;margin-bottom:10px;border-right:4px solid #c0392b;">'+
      '<div style="color:#fff;font-size:15px;font-weight:500;margin-bottom:6px;">'+p.he+'</div>'+
      '<div style="color:#fff;font-size:20px;font-weight:600;text-align:center;margin-bottom:6px;font-family:Georgia,serif;letter-spacing:0.03em;">'+p.trans+'</div>'+
      '<div style="color:#D2B48C;font-size:16px;text-align:center;margin-bottom:10px;font-family:Georgia,serif;">'+p.ar+'</div>'+
      '<div style="display:flex;gap:8px;">'+
        '<button onclick="playQK('+i+',1)" style="flex:1;padding:12px;background:#c0392b;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;">🔊 השמע</button>'+
      '</div>'+
    '</div>'`;

    if(code.includes("'🐢 צב</button>'")){
      code = code.replace(oldCardTemplate, newCardTemplate);
      fixes++;
      status.innerHTML += '<br>✓ הוסר צב, נשאר רק כפתור השמע';
      status.innerHTML += '<br>✓ תעתיק בולט ומרכזי, עברית קטנה למעלה';
    } else {
      status.innerHTML += '<br>⚠️ לא נמצא הפורמט הישן, מנסה דרך אחרת...';
      
      // Try alternative approach - find the play buttons section
      code = code.replace(
        /'\<button onclick="playQK\('\+i\+',0\.7\).*?🐢 צב\<\/button\>'\+\s*'\<button/g,
        "'<button"
      );
      
      // Replace card layout
      code = code.replace(
        "'<div style=\"color:#fff;font-size:15px;font-weight:600;margin-bottom:6px;\">'+p.he+'</div>'+",
        "'<div style=\"color:#fff;font-size:15px;font-weight:500;margin-bottom:6px;\">'+p.he+'</div>'+"
      );
      code = code.replace(
        "'<div style=\"color:#D2B48C;font-size:15px;font-family:Georgia,serif;margin-bottom:4px;\">'+p.trans+'</div>'+",
        "'<div style=\"color:#fff;font-size:20px;font-weight:600;text-align:center;margin-bottom:6px;font-family:Georgia,serif;letter-spacing:0.03em;\">'+p.trans+'</div>'+"
      );
      code = code.replace(
        "'<div style=\"color:#a0b8c8;font-size:17px;text-align:center;margin-bottom:10px;font-family:Georgia,serif;\">'+p.ar+'</div>'+",
        "'<div style=\"color:#D2B48C;font-size:16px;text-align:center;margin-bottom:10px;font-family:Georgia,serif;\">'+p.ar+'</div>'+"
      );
      
      // Remove turtle button
      if(code.includes('0.7)')){
        code = code.replace(/'\<button onclick="playQK\('\+i\+',0\.7\)"[^']*🐢 צב\<\/button\>'\+\s*/g, '');
        fixes++;
        status.innerHTML += '<br>✓ הוסר כפתור צב';
      }
      
      // Change rabbit to "השמע"
      code = code.replace("🐇 ארנב", "🔊 השמע");
      code = code.replace("background:#FF8C00;border:none;border-radius:8px", "background:#c0392b;border:none;border-radius:10px");
      code = code.replace("font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;\">🔊 השמע", "font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;\">🔊 השמע");
      fixes++;
      status.innerHTML += '<br>✓ שונה לכפתור השמע';
    }

    const ta = document.getElementById('result');
    ta.value = code;
    ta.style.display = 'block';
    document.getElementById('copyBtn').style.display = 'inline-block';
    
    status.innerHTML += '<br><br><strong style="color:#27ae60;">בוצע!</strong>';
    status.innerHTML += '<br><br>1. לחצי "📋 העתק הכל"<br>2. פתחי: <a href="https://github.com/hagaiedit-jpg/arabic-saves-lives-/edit/main/index.html" target="_blank">GitHub Editor</a><br>3. Ctrl+A → Delete → Ctrl+V → Commit';
    
  }catch(e){
    status.textContent = 'שגיאה: ' + e.message;
  }
}

function copyCode(){
  const ta = document.getElementById('result');
  ta.select();
  ta.setSelectionRange(0, 99999999);
  navigator.clipboard.writeText(ta.value).then(function(){
    document.getElementById('copyBtn').textContent = '✓ הועתק!';
    document.getElementById('copyBtn').style.background = '#1D9E75';
  });
}
</script>
</body>
</html>
